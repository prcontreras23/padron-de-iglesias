/* ---- CONFIGURACION ---- */
function buildUsuariosSection() {
  if (!isAdmin()) return '';
  const perms = [
    { key:'ver_dashboard',    label:'Ver Dashboard' },
    { key:'ver_zonas',        label:'Ver Zonas' },
    { key:'ver_distritos',    label:'Ver Distritos' },
    { key:'ver_iglesias',     label:'Ver Iglesias' },
    { key:'ver_pastores',     label:'Ver Pastores' },
    { key:'ver_solicitudes',  label:'Ver Solicitudes' },
    { key:'ver_permisos',     label:'Ver Permisos de Ausencia' },
    { key:'gestionar_permisos', label:'Gestionar Permisos de Ausencia' },
    { key:'ver_vacaciones',     label:'Ver Vacaciones' },
    { key:'gestionar_vacaciones', label:'Gestionar Vacaciones' },
    { key:'ver_organizacion', label:'Ver Organización de Iglesias' },
    { key:'gestionar_organizacion', label:'Gestionar Organización de Iglesias' },
    { key:'ver_historial',    label:'Ver Historial' },
    { key:'ver_configuracion',label:'Ver Configuración' },
    { key:'editar_iglesias',  label:'Editar Iglesias' },
    { key:'editar_pastores',  label:'Editar Pastores' },
    { key:'editar_distritos', label:'Editar Distritos' },
    { key:'editar_zonas',     label:'Editar Zonas' },
    { key:'eliminar_iglesias',label:'Eliminar Iglesias' },
    { key:'eliminar_pastores',label:'Eliminar Pastores' },
    { key:'gestionar_usuarios',label:'Administrador (gestionar usuarios)' },
  ];
  const chk = (key, val, uid) =>
    `<label style="display:flex;align-items:center;gap:7px;font-size:13px;color:#374151;cursor:pointer;padding:4px 0;">
      <input type="checkbox" data-perm-uid="${escHtml(uid)}" data-perm="${key}" ${val?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:#2563eb;" />
      ${key==='gestionar_usuarios'?`<strong>${escHtml(perms.find(p=>p.key===key)?.label||key)}</strong>`:escHtml(perms.find(p=>p.key===key)?.label||key)}
    </label>`;

  if (S._allProfilesLoading) return `<div style="background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;"><h2 style="font-size:16px;font-weight:700;color:#1a2340;margin-bottom:12px;">Usuarios del Sistema</h2><div style="color:#9ca3af;font-size:14px;">Cargando usuarios...</div></div>`;
  if (!S._allProfiles) return `<div style="background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><h2 style="font-size:16px;font-weight:700;color:#1a2340;">Usuarios del Sistema</h2><button id="btn-load-profiles" style="display:flex;align-items:center;gap:6px;background:#2563eb;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;">Ver usuarios</button></div><p style="font-size:13px;color:#9ca3af;">Haz clic para cargar la lista de usuarios.</p></div>`;

  const nuf = S.newUserForm;
  const nuPerms = nuf.permisos;
  const modalHtml = S.showNewUserModal ? `
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:white;border-radius:16px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto;">
      <div style="padding:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 style="font-size:17px;font-weight:700;color:#1a2340;">${S.editingProfileId ? 'Editar Usuario' : 'Nuevo Usuario'}</h2>
          <button id="btn-nu-close" style="background:transparent;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#9ca3af;">${icons.x}</button>
        </div>
        ${S.editingProfileId ? '' : `
        ${formField('Correo electrónico','nu-email',nuf.email,'email','usuario@correo.com','',true)}
        ${S.editingProfileId ? '' : '<p style="font-size:12px;color:#6b7280;margin:0 0 12px;">Se generará una contraseña temporal y se enviará por correo al usuario.</p>'}
        `}
        ${formField('Nombre completo','nu-nombre',nuf.nombre,'text','Nombre del usuario')}
        <div style="margin-top:16px;">
          <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:10px;">Permisos</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#f8f9fc;border-radius:10px;padding:14px;">
            ${perms.map(p=>chk(p.key, !!nuPerms[p.key], 'new')).join('')}
          </div>
        </div>
      </div>
      <div style="padding:16px 24px;border-top:1px solid #f0f2f7;display:flex;gap:10px;justify-content:flex-end;">
        <button id="btn-nu-cancel" style="padding:10px 20px;border-radius:8px;border:1.5px solid #e8eaf2;background:white;color:#6b7280;font-size:14px;cursor:pointer;font-weight:500;">Cancelar</button>
        <button id="btn-nu-save" style="padding:10px 24px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:14px;cursor:pointer;font-weight:500;">Guardar</button>
      </div>
    </div>
  </div>` : '';

  const rows = (S._allProfiles||[]).map(pr => {
    const p = pr.permisos||{};
    const badge = p.gestionar_usuarios
      ? `<span style="background:#fef3c7;color:#92650a;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">Admin</span>`
      : `<span style="background:#f1f5f9;color:#64748b;border-radius:20px;padding:2px 10px;font-size:11px;">Solo lectura</span>`;
    const isMe = pr.id === S.currentUser?.id;
    return `<tr style="border-bottom:1px solid #f0f2f7;">
      <td style="padding:12px 16px;">
        <div style="font-weight:500;font-size:14px;color:#1a2340;">${escHtml(pr.nombre||'(sin nombre)')}</div>
        <div style="font-size:12px;color:#9ca3af;">${escHtml(pr.email)}</div>
      </td>
      <td style="padding:12px 16px;">${badge}</td>
      <td style="padding:12px 16px;"><span style="color:${pr.activo!==false?'#16a34a':'#ef4444'};font-size:13px;">${pr.activo!==false?'Activo':'Inactivo'}</span></td>
      <td style="padding:12px 12px;">
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button data-edit-profile="${escHtml(pr.id)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
          ${!isMe ? `<button data-toggle-profile="${escHtml(pr.id)}" data-activo="${pr.activo!==false?'1':'0'}" style="background:transparent;border:1px solid ${pr.activo!==false?'#fee2e2':'#d1fae5'};border-radius:6px;padding:5px 10px;cursor:pointer;color:${pr.activo!==false?'#ef4444':'#16a34a'};font-size:12px;">${pr.activo!==false?'Desactivar':'Activar'}</button><button data-delete-profile="${escHtml(pr.id)}" data-email="${escHtml(pr.email)}" style="background:transparent;border:1px solid #fca5a5;border-radius:6px;padding:5px 8px;cursor:pointer;color:#dc2626;display:flex;align-items:center;" title="Eliminar usuario">${icons.trash||'🗑'}</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');

  return `
  ${modalHtml}
  <div style="background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div><h2 style="font-size:16px;font-weight:700;color:#1a2340;">Usuarios del Sistema</h2><p style="font-size:13px;color:#9ca3af;margin-top:2px;">Crea usuarios y asigna sus permisos.</p></div>
      <button id="btn-add-user" style="display:flex;align-items:center;gap:6px;background:#2563eb;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;">${icons.plus.replace('currentColor','white')} Nuevo usuario</button>
    </div>
    ${rows ? `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead><tr style="background:#f8f9fc;">${thCell('Usuario')}${thCell('Rol')}${thCell('Estado')}${thCell('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>` : `<div style="padding:30px 0;text-align:center;color:#9ca3af;font-size:14px;">No hay usuarios registrados.</div>`}
  </div>`;
}

      </div>
      ${S.camposCustom.length ? `<div style="overflow-x:auto;margin-top:16px;"><table style="width:100%;border-collapse:collapse;font-size:14px;"><thead><tr style="background:#f8f9fc;">${thCell('Campo')}${thCell('Tipo')}${thCell('Placeholder')}${thCell('')}</tr></thead><tbody>${rows}</tbody></table></div>` : `<div style="padding:30px 0;text-align:center;color:#9ca3af;font-size:14px;">No hay campos personalizados. Agrega el primero.</div>`}

    <div style="background:#fff8e6;border-radius:12px;padding:18px 20px;border:1px solid #f0d880;">
      <div style="font-weight:600;font-size:14px;color:#92650a;margin-bottom:6px;">Integracion con Google Drive</div>
      <p style="font-size:13px;color:#7a5a0a;line-height:1.6;">Para vincular carpetas de Drive a cada iglesia, edita la iglesia y pega la URL de la carpeta en el campo <strong>Carpeta Drive</strong>. El enlace aparecera como icono en la tabla de iglesias.</p>
    </div>

        ${p._hasNew && !S.importing ? `
          <button id="btn-import-only-new" style="padding:10px 16px;border-radius:8px;border:1.5px solid #15803d;background:white;color:#15803d;font-size:13px;cursor:pointer;font-weight:600;">Solo nuevos</button>
          <button id="btn-import-only-update" style="padding:10px 16px;border-radius:8px;border:1.5px solid #854d0e;background:white;color:#854d0e;font-size:13px;cursor:pointer;font-weight:600;">Solo actualizar</button>

        <button id="btn-import-confirm" style="padding:10px 20px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:14px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:8px;">${S.importing?`<span style="animation:spin .8s linear infinite;display:inline-block;">${icons.spin.replace('currentColor','white')}</span> Importando...`:'Importar todo'}</button>
      ` : ''}

    </div>
  </div>`;
}
function previewCard(label, rows, color) {
  const newCount = rows.filter(r=>r._isNew).length;
  const updCount = rows.length - newCount;
  return `<div style="padding:14px 18px;background:#f8f9fc;border-radius:10px;border-left:4px solid ${color};">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${(newCount&&updCount)?'10px':'0'};">
      <div style="flex:1;font-weight:600;font-size:14px;color:#1a2340;">${label}</div>
      <span style="background:${color};color:white;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;">${rows.length} filas</span>
    </div>
    ${newCount&&updCount ? `<div style="display:flex;gap:8px;flex-wrap:wrap;">
      <span style="background:#dcfce7;color:#15803d;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500;">+${newCount} nuevos</span>
      <span style="background:#fef9c3;color:#854d0e;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500;">&#9998; ${updCount} actualizaciones</span>
    </div>` : newCount ? `<span style="background:#dcfce7;color:#15803d;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500;">+${newCount} nuevos</span>`
    : `<span style="background:#fef9c3;color:#854d0e;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500;">&#9998; ${updCount} actualizaciones</span>`}
  </div>`;
}

/* ---- HELPERS ---- */
function thSort(label, col) {
  const active = S.sortCol === col;
  const arrow = active ? (S.sortDir==='asc' ? ' &#8593;' : ' &#8595;') : '';
  return `<th data-sort="${col}" style="padding:13px 20px;text-align:left;font-weight:600;font-size:11px;color:${active?'#2563eb':'#6b7280'};text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8eaf2;white-space:nowrap;cursor:pointer;user-select:none;">${label}${arrow}</th>`;
}
function thCell(label, align='left') { return `<th style="padding:13px 20px;text-align:${align};font-weight:600;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8eaf2;white-space:nowrap;">${label}</th>`; }
function emptyRow(cols, msg) { return `<tr><td colspan="${cols}" style="padding:40px;text-align:center;color:#9ca3af;font-size:14px;">${msg}</td></tr>`; }
function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formField(label, id, value, type='text', placeholder='', fontFamily='', required=false) {
  return `<div><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">${label}${required?'<span style="color:#ef4444;margin-left:2px;">*</span>':''}</label><input id="${id}" type="${type}" value="${escHtml(value)}" placeholder="${placeholder}" style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;${fontFamily?'font-family:'+fontFamily+';':''}" /></div>`;
}

/* =====================================================================
   EVENTS
   ===================================================================== */
function bindEvents() {
  q('#btn-sidebar-toggle', el => el.addEventListener('click', () => { S.sidebarOpen=!S.sidebarOpen; render(); }));
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => { S.view=el.dataset.nav; location.hash=S.view; S.search=''; S.fZona='all'; S.fDistrito='all'; S.fPastor='all'; S.fEstado='all'; S.fRol='all'; S.fTipoIg='all'; S.fOrgFase='all'; S.page=1; if(el.dataset.nav==='historial')S._historialData=null; if(el.dataset.nav==='pastores')S.personalTab='pastores'; render(); }));
  document.querySelectorAll('[data-nav-group]').forEach(el => el.addEventListener('click', () => { const g=el.dataset.navGroup; S.navGroupOpen[g] = !(S.navGroupOpen[g]!==false); render(); }));
  document.querySelectorAll('[data-nav-zona]').forEach(el => el.addEventListener('click', () => { S.view='distritos'; S.fZona=el.dataset.navZona; S.search=''; S.page=1; render(); }));
  document.querySelectorAll('[data-nav-zona-ig]').forEach(el => el.addEventListener('click', () => { S.view='iglesias'; S.fZona=el.dataset.navZonaIg; S.fDistrito='all'; S.search=''; S.page=1; render(); }));
  document.querySelectorAll('[data-nav-dash]').forEach(el => el.addEventListener('click', () => {
    const val = el.dataset.navDash; if (!val) return;
    const [vista, param] = val.split('|');
    S.view=vista; S.search=''; S.page=1; S.fZona='all'; S.fDistrito='all'; S.fPastor='all'; S.fEstado='all'; S.fRol='all'; S.fTipoIg='all'; S.fOrgFase='all';
    if (vista==='pastores') S.personalTab = 'pastores';
    if (param) {
      const [key,v] = param.split('=');
      if (key==='estado') S.fEstado=v;
      else if (key==='rol') { S.fRol=v; if (vista==='pastores' && (v==='departamental'||v==='administrador'||v==='oficina')) S.personalTab='oficina'; }
      else if (key==='distrito') S.fDistrito=v;
      else if (key==='tipo' && v==='grupo') S.fTipoIg='grupo';
    }
    render();
  }));
  document.querySelectorAll('[data-filter-zona]').forEach(el => el.addEventListener('click', () => { S.fZona=el.dataset.filterZona; S.page=1; render(); }));
  document.querySelectorAll('[data-ver-distrito]').forEach(el => el.addEventListener('click', () => { S.view='iglesias'; S.fZona=el.dataset.verZona; S.fDistrito=el.dataset.verDistrito; S.search=''; S.page=1; render(); }));
  q('#main-search', el => el.addEventListener('input', e => { S.search=e.target.value; S.page=1; debouncedRenderPreservingFocus(); }));
  q('#sel-zona', el => el.addEventListener('change', e => { S.fZona=e.target.value; S.fDistrito='all'; S.page=1; render(); }));
  q('#sel-distrito', el => el.addEventListener('change', e => { S.fDistrito=e.target.value; S.page=1; render(); }));
  q('#btn-prev', el => el.addEventListener('click', () => { if(S.page>1){S.page--;render();} }));
  q('#btn-next', el => el.addEventListener('click', () => { S.page++; render(); }));


  /* IMPORT EXCEL */
  q('#btn-import-excel', el => el.addEventListener('click', () => { S.showImportModal=true; S.importPreview=null; S.importResult=null; render(); }));
  q('#btn-import-close',  el => el.addEventListener('click', () => { S.showImportModal=false; render(); }));
  q('#btn-import-cancel-action', el => el.addEventListener('click', () => { if(S.importPreview){S.importPreview=null;render();}else{S.showImportModal=false;render();} }));
  q('#btn-import-done',   el => el.addEventListener('click', () => { S.showImportModal=false; S.importResult=null; render(); }));
  q('#import-modal-bg',   el => el.addEventListener('click', e => { if(e.target===el&&!S.importing){S.showImportModal=false;render();} }));
  q('#import-drop-zone', el => {
    el.addEventListener('click', () => document.getElementById('import-file-input')?.click());
    el.addEventListener('dragover', e => { e.preventDefault(); el.style.background='#fff8e6'; });
    el.addEventListener('dragleave', () => { el.style.background='#fffdf0'; });
    el.addEventListener('drop', async e => { e.preventDefault(); el.style.background='#fffdf0'; const file=e.dataTransfer.files[0]; if(file){S.importPreview=await parseExcel(file);render();} });
  });
  q('#import-file-input', el => el.addEventListener('change', async e => { const file=e.target.files[0]; if(file){S.importPreview=await parseExcel(file);render();} }));
  q('#btn-import-confirm',     el => el.addEventListener('click', () => { if(S.importPreview)executeImport(S.importPreview, 'all'); }));
  q('#btn-import-only-new',    el => el.addEventListener('click', () => { if(S.importPreview)executeImport(S.importPreview, 'new'); }));
  q('#btn-import-only-update', el => el.addEventListener('click', () => { if(S.importPreview)executeImport(S.importPreview, 'update'); }));

  /* ZONAS */
  q('#btn-add-zona', el => el.addEventListener('click', () => { S.showZonaModal=true; S.zonaModalMode='add'; S.editZonaCod=null; S.formZona={cod:nextZonaCod(),nombre:''}; render(); }));
  document.querySelectorAll('[data-edit-zona]').forEach(el => el.addEventListener('click', () => { const z=RAW.zonas.find(z=>z.cod===el.dataset.editZona); if(!z) return; S.showZonaModal=true; S.zonaModalMode='edit'; S.editZonaCod=z.cod; S.formZona={cod:z.cod,nombre:z.nombre}; render(); }));
  document.querySelectorAll('[data-del-zona]').forEach(el => el.addEventListener('click', () => { S.showDeleteZonaConfirm=true; S.deleteZonaCod=el.dataset.delZona; render(); }));
  q('#btn-zona-close',  el => el.addEventListener('click', () => { S.showZonaModal=false; render(); }));
  q('#btn-zona-cancel', el => el.addEventListener('click', () => { S.showZonaModal=false; render(); }));
  q('#zona-modal-bg',   el => el.addEventListener('click', e => { if(e.target===el){S.showZonaModal=false;render();} }));
  q('#btn-zona-save', el => el.addEventListener('click', async () => {
    const nombre=document.getElementById('zona-nombre')?.value.trim()||''; const cod=document.getElementById('zona-cod')?.value.trim().toUpperCase()||'';
    if(!nombre){showToast('El nombre es requerido','error');return;} if(!cod){showToast('El codigo es requerido','error');return;}
    if(S.zonaModalMode==='add'&&RAW.zonas.find(z=>z.cod===cod)){showToast('El codigo ya existe','error');return;}
    if(S.sbClient){const{error}=S.zonaModalMode==='add'?await S.sbClient.from('zonas').insert([{cod,nombre}]):await S.sbClient.from('zonas').update({nombre}).eq('cod',cod);if(error){showToast('Error: '+error.message,'error');return;}}
    if(S.zonaModalMode==='add')RAW.zonas.push({cod,nombre,distritos:0,_igCount:0});
    else{const i=RAW.zonas.findIndex(z=>z.cod===cod);if(i>=0)RAW.zonas[i]={...RAW.zonas[i],nombre};}
    registrarHistorial(S.zonaModalMode==='add'?'Creo':'Edito','Zona',cod,nombre);recomputeCounts();S.showZonaModal=false;showToast(S.zonaModalMode==='add'?'Zona creada':'Zona actualizada','success');render();
  }));
  q('#btn-del-zona-cancel',  el => el.addEventListener('click', () => { S.showDeleteZonaConfirm=false;S.deleteZonaCod=null;render(); }));
  q('#btn-del-zona-confirm', el => el.addEventListener('click', async () => {
    const cod=S.deleteZonaCod;
    if(RAW.distritos.some(d=>d.codZona===cod)){showToast('No se puede eliminar: tiene distritos asociados','error');S.showDeleteZonaConfirm=false;S.deleteZonaCod=null;render();return;}
    if(S.sbClient){const{error}=await S.sbClient.from('zonas').delete().eq('cod',cod);if(error){showToast('Error: '+error.message,'error');return;}}
    const zNom=RAW.zonas.find(z=>z.cod===cod)?.nombre||cod;RAW.zonas=RAW.zonas.filter(z=>z.cod!==cod);registrarHistorial('Elimino','Zona',cod,zNom);recomputeCounts();S.showDeleteZonaConfirm=false;S.deleteZonaCod=null;showToast('Zona eliminada','success');render();
  }));

  /* DISTRITOS */
  q('#btn-add-distrito', el => el.addEventListener('click', () => { S.showDistritoModal=true; S.distritoModalMode='add'; S.editDistritoCod=null; S.formDistrito={cod:nextDistritoCod(),nombre:'',codZona:'',zona:''}; render(); }));
  document.querySelectorAll('[data-edit-distrito]').forEach(el => el.addEventListener('click', () => { const d=RAW.distritos.find(d=>d.cod===el.dataset.editDistrito); if(!d) return; S.showDistritoModal=true; S.distritoModalMode='edit'; S.editDistritoCod=d.cod; S.formDistrito={cod:d.cod,nombre:d.nombre,codZona:d.codZona||'',zona:d.zona||''}; render(); }));
  document.querySelectorAll('[data-del-distrito]').forEach(el => el.addEventListener('click', () => { S.showDeleteDistritoConfirm=true; S.deleteDistritoCod=el.dataset.delDistrito; render(); }));
  q('#btn-distrito-close',  el => el.addEventListener('click', () => { S.showDistritoModal=false; render(); }));
  q('#btn-distrito-cancel', el => el.addEventListener('click', () => { S.showDistritoModal=false; render(); }));
  q('#distrito-modal-bg',   el => el.addEventListener('click', e => { if(e.target===el){S.showDistritoModal=false;render();} }));
  q('#btn-distrito-save', el => el.addEventListener('click', async () => {
    const nombre=document.getElementById('distrito-nombre')?.value.trim()||''; const cod=document.getElementById('distrito-cod')?.value.trim().toUpperCase()||''; const codZona=document.getElementById('distrito-zona')?.value||''; const zona=RAW.zonas.find(z=>z.cod===codZona)?.nombre||'';
    if(!nombre){showToast('El nombre es requerido','error');return;} if(!cod){showToast('El codigo es requerido','error');return;}

    const gv = id => document.getElementById(id)?.value ?? '';

    const iglesia_cod = S.organizacionModalMode==='add' ? (document.getElementById('org-iglesia-select')?.value||'') : S.formOrganizacion.iglesia_cod;
    if (!iglesia_cod) { showToast('Debe seleccionar un grupo','error'); return; }
    const ig = RAW.iglesias.find(i=>i.cod===iglesia_cod);
    const checklist_materiales = {};
    MATERIALES_ORG.forEach(m => checklist_materiales[m.id] = gc('org-mat-'+m.id));
    const plataformas = {};
    PLATAFORMAS_ORG.forEach(p => plataformas[p.id] = gc('org-plat-'+p.id));
    const hoy = new Date().toISOString().slice(0,10);
    const fase1_completada = gc('org-fase1_completada');
    const fase2_completada = gc('org-fase2_completada');

    const completado = fase1_completada && fase2_completada && fase3_completada && fase4_completada && fase5_completada;
    const payload = {
      iglesia_cod, iglesia_nombre: ig ? ig.nombre : S.formOrganizacion.iglesia_nombre, zona: ig ? (ig.zona||'') : S.formOrganizacion.zona, distrito: ig ? (ig.distrito||'') : S.formOrganizacion.distrito,
      pastor_asignado: gv('org-pastor-asignado').trim()||null, pastor_telefono: gv('org-pastor-telefono').trim()||null, pastor_confirmado: gc('org-pastor-confirmado'),
      fase1_completada, fase1_fecha: fase1_completada ? (S.formOrganizacion.fase1_fecha||hoy) : null,
      fecha_ceremonia: gv('org-fecha-ceremonia')||null, req_min_miembros: gc('org-req-miembros'), req_lideres: gc('org-req-lideres'), req_solvencia: gc('org-req-solvencia'), instructivo_enviado_junta: gc('org-instructivo-enviado'),
      fase2_completada, fase2_fecha: fase2_completada ? (S.formOrganizacion.fase2_fecha||hoy) : null,
      fecha_ceremonia_realizada: gv('org-fecha-ceremonia-realizada')||null, acta_firmada: gc('org-acta-firmada'), checklist_materiales,
      fase3_completada, fase3_fecha: fase3_completada ? (S.formOrganizacion.fase3_fecha||hoy) : null,
      acms_actualizado: gc('org-acms-actualizado'), acms_fecha: gv('org-acms-fecha')||null, oficiales_electos: gv('org-oficiales-electos').trim()||null,
      fase4_completada, fase4_fecha: fase4_completada ? (S.formOrganizacion.fase4_fecha||hoy) : null,
      plataformas, fase5_completada, fase5_fecha: fase5_completada ? (S.formOrganizacion.fase5_fecha||hoy) : null,
      completado, completado_fecha: completado ? (S.formOrganizacion.completado_fecha||hoy) : null,
      notas: gv('org-notas').trim()||null,
    };
    const wasFase4Completed = S.organizacionModalMode==='edit' ? !!(S._organizaciones||[]).find(o=>o.id===S.editOrganizacionId)?.fase4_completada : false;

    if (S.organizacionModalMode==='add') {
      const { data, error } = await S.sbClient.from('organizacion_iglesias').insert([payload]).select();
      if (error) { showToast('Error: '+error.message,'error'); return; }
      S._organizaciones = [data[0], ...(S._organizaciones||[])];

    } else {
      const { error } = await S.sbClient.from('organizacion_iglesias').update(payload).eq('id', S.editOrganizacionId);
      if (error) { showToast('Error: '+error.message,'error'); return; }
      S._organizaciones = (S._organizaciones||[]).map(o => o.id===S.editOrganizacionId ? {...o,...payload} : o);
      registrarHistorial('Edito', 'OrganizacionIglesia', iglesia_cod, payload.iglesia_nombre);
    }

    if (fase4_completada && !wasFase4Completed) {
      await promoverGrupoAIglesia(iglesia_cod, payload.iglesia_nombre);
    }

    S.showOrganizacionModal=false;
    showToast(S.organizacionModalMode==='add'?'Registro creado':'Registro actualizado','success');

  /* FLUJO CONFIG */
  q('#btn-save-flujo-cfg', el => el.addEventListener('click', async () => {

      const[zR,dR,iR,pR]=await Promise.all([c.from('zonas').select('*'),c.from('distritos').select('*'),c.from(table).select('*').order('nombre'),c.from('pastores').select('*').order('nombre')]);

function recomputeCounts() {
  for (const d of RAW.distritos) d.iglesias = RAW.iglesias.filter(i=>i.codDistrito===d.cod&&i.tipo!=='pendiente_revision'&&i.pastor&&i.pastor.trim()).length;
  for (const z of RAW.zonas) { z.distritos=RAW.distritos.filter(d=>d.codZona===z.cod).length; z._igCount=RAW.iglesias.filter(i=>i.codZona===z.cod&&i.tipo!=='pendiente_revision'&&i.pastor&&i.pastor.trim()).length; }
}

function normalizeKey(k) { return String(k).toLowerCase().replace(/[^a-z0-9]/g,''); }
function findCol(row, ...candidates) {
  const keys = Object.keys(row); for (const c of candidates) { const n=normalizeKey(c); const k=keys.find(k=>normalizeKey(k)===n); if(k!==undefined)return row[k]; } return '';
}
function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type:'array' });
        const preview = {};
        const sheetMap = {};
        for (const name of wb.SheetNames) { sheetMap[name.toLowerCase().trim()] = name; }
        const getSheet = (...names) => { for (const n of names) { const key=n.toLowerCase(); if(sheetMap[key]) return XLSX.utils.sheet_to_json(wb.Sheets[sheetMap[key]], {defval:''}); } return null; };

        // Intentar hojas con nombre estandar primero
        const zonasSheet    = getSheet('zonas','zona');
        const distritosSheet = getSheet('distritos','distrito');
        const iglesiasSheet  = getSheet('iglesias','iglesia','churches');
        const pastoresSheet  = getSheet('pastores','pastor','pastors');

        if (zonasSheet)     preview.zonas    = zonasSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre','name')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (distritosSheet) preview.distritos = distritosSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (iglesiasSheet)  preview.iglesias  = iglesiasSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), pastor: String(findCol(r,'pastor')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim(), codDistrito: String(findCol(r,'codDistrito','cod_distrito','coddistrito')||'').trim().toUpperCase(), distrito: String(findCol(r,'distrito')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (pastoresSheet)  preview.pastores  = pastoresSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), telefono: String(findCol(r,'telefono','tel','phone')||'').trim(), email: String(findCol(r,'email','correo')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim(), codDistrito: String(findCol(r,'codDistrito','cod_distrito','coddistrito')||'').trim().toUpperCase(), distrito: String(findCol(r,'distrito')||'').trim() })).filter(r=>r.cod&&r.nombre);

        // Si no habia hojas estandar, buscar formato plano tipo PADRON (una sola hoja con todo)
        if (!zonasSheet && !distritosSheet && !iglesiasSheet && !pastoresSheet) {
          // Buscar la hoja que tenga columnas de iglesia
          for (const sheetName of wb.SheetNames) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
            if (!rows.length) continue;
            const headers = Object.keys(rows[0]).map(k=>k.toLowerCase());
            const hasCodIglesia = headers.some(h=>h.includes('iglesia')||h.includes('cod_ig'));
            if (!hasCodIglesia) continue;
            // Es formato plano — extraer entidades unicas
            const zonasMap = {}; const distritosMap = {}; const pastoresMap = {};
            const iglesias = [];
            for (const r of rows) {
              const codZona    = String(findCol(r,'COD_ZONA','codZona','cod_zona')||'').trim().toUpperCase();
              const zona       = String(findCol(r,'ZONA','zona')||'').trim();
              const codDist    = String(findCol(r,'COD_DISTRITO','codDistrito','cod_distrito')||'').trim().toUpperCase();
              const distrito   = String(findCol(r,'Distrito','DISTRITO','distrito')||'').trim();
              const codIglesia = String(findCol(r,'COD_IGLESIA','cod_iglesia','codIglesia')||'').trim().toUpperCase();
              const iglesia    = String(findCol(r,'Iglesia','IGLESIA','iglesia','nombre')||'').trim();
              const pastor     = String(findCol(r,'Pastor','PASTOR','pastor')||'').trim();
              if (codZona&&zona&&!zonasMap[codZona])    zonasMap[codZona]    = {cod:codZona,nombre:zona};
              if (codDist&&distrito&&!distritosMap[codDist]) distritosMap[codDist] = {cod:codDist,nombre:distrito,codZona,zona};
              if (pastor&&!pastoresMap[pastor]) {
                // Buscar cod en RAW.pastores por nombre, o generar uno
                const existing = RAW.pastores.find(p=>p.nombre.toLowerCase()===pastor.toLowerCase());
                const cod = existing ? existing.cod : ('P'+String(Object.keys(pastoresMap).length+RAW.pastores.length+1).padStart(3,'0'));
                pastoresMap[pastor] = {cod,nombre:pastor,telefono:'',email:'',codZona,zona,codDistrito:codDist,distrito};
              }
              if (codIglesia&&iglesia) iglesias.push({cod:codIglesia,nombre:iglesia,pastor,codZona,zona,codDistrito:codDist,distrito});
            }
            preview.zonas     = Object.values(zonasMap);
            preview.distritos = Object.values(distritosMap);
            preview.iglesias  = iglesias;
            preview.pastores  = Object.values(pastoresMap);
            break;
          }
        }
        // Anotar cuales son nuevos vs actualizaciones
        if (preview.zonas)     preview.zonas.forEach(r=>{ r._isNew = !RAW.zonas.find(x=>x.cod===r.cod); });
        if (preview.distritos) preview.distritos.forEach(r=>{ r._isNew = !RAW.distritos.find(x=>x.cod===r.cod); });
        if (preview.iglesias)  preview.iglesias.forEach(r=>{ r._isNew = !RAW.iglesias.find(x=>x.cod===r.cod); });
        if (preview.pastores)  preview.pastores.forEach(r=>{ r._isNew = !RAW.pastores.find(x=>x.cod===r.cod); });
        // Si hay nuevos, pedir confirmacion
        const hasNew = (preview.zonas||[]).some(r=>r._isNew)||(preview.distritos||[]).some(r=>r._isNew)||(preview.iglesias||[]).some(r=>r._isNew)||(preview.pastores||[]).some(r=>r._isNew);
        preview._hasNew = hasNew;
        resolve(preview);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function executeImport(preview, mode='all') {
  const filter = rows => mode==='all' ? rows : mode==='new' ? rows.filter(r=>r._isNew) : rows.filter(r=>!r._isNew);
  const clean = rows => rows.map(r => { const {_isNew, ...rest}=r; return rest; });
  S.importing = true; render();
  const sb = S.sbClient; let total = 0; let errorMsg = '';
  try {
    if (preview.zonas?.length) {
      const rows_z = clean(filter(preview.zonas)); if(!rows_z.length) {}
      else { const { error } = await sb.from('zonas').upsert(rows_z, { onConflict: 'cod' });
      if (error) throw error;
      for (const z of rows_z) { const i=RAW.zonas.findIndex(x=>x.cod===z.cod); if(i>=0)RAW.zonas[i]={...RAW.zonas[i],...z}; else RAW.zonas.push(z); }
      total += rows_z.length;
      } }
    if (preview.distritos?.length) {
      const rows_d_all = clean(filter(preview.distritos));
      if (rows_d_all.length) { const rows = rows_d_all.map(d => { if (!d.codZona) { const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===d.zona.toLowerCase()); if(z)d.codZona=z.cod; } return d; });
      const { error } = await sb.from('distritos').upsert(rows, { onConflict: 'cod' });
      if (error) throw error;
      for (const d of rows) { const i=RAW.distritos.findIndex(x=>x.cod===d.cod); if(i>=0)RAW.distritos[i]={...RAW.distritos[i],...d}; else RAW.distritos.push(d); }
      total += rows.length;
      } }
    if (preview.iglesias?.length) {
      const rows_i_all = clean(filter(preview.iglesias));
      if (rows_i_all.length) { const rows = rows_i_all.map(ig => { if(!ig.codZona&&ig.zona){const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===ig.zona.toLowerCase());if(z)ig.codZona=z.cod;} if(!ig.codDistrito&&ig.distrito){const d=RAW.distritos.find(d=>d.nombre.toLowerCase()===ig.distrito.toLowerCase());if(d)ig.codDistrito=d.cod;} return ig; });
      const chunks = []; for(let i=0;i<rows.length;i+=200)chunks.push(rows.slice(i,i+200));
      for (const chunk of chunks) { const{error}=await sb.from(S.sbTable).upsert(chunk,{onConflict:'cod'}); if(error)throw error; }
      for (const ig of rows) { const i=RAW.iglesias.findIndex(x=>x.cod===ig.cod); if(i>=0)RAW.iglesias[i]={...RAW.iglesias[i],...ig}; else RAW.iglesias.push(ig); }
      total += rows.length;
      } }
    if (preview.pastores?.length) {
      const rows_p_all = clean(filter(preview.pastores));
      if (rows_p_all.length) { const rows = rows_p_all.map(p => { if(!p.codZona&&p.zona){const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===p.zona.toLowerCase());if(z)p.codZona=z.cod;} if(!p.codDistrito&&p.distrito){const d=RAW.distritos.find(d=>d.nombre.toLowerCase()===p.distrito.toLowerCase());if(d)p.codDistrito=d.cod;} return p; });
      const { error } = await sb.from('pastores').upsert(rows, { onConflict: 'cod' });
      if (error) throw error;
      for (const p of rows) { const i=RAW.pastores.findIndex(x=>x.cod===p.cod); if(i>=0)RAW.pastores[i]={...RAW.pastores[i],...p}; else RAW.pastores.push(p); }
      total += rows.length;
      } }
    recomputeCounts();
    S.importResult = { error: false, msg: `Se importaron o actualizaron ${total} registros exitosamente.` };
  } catch(e) {
    S.importResult = { error: true, msg: e.message || String(e) };
  }
  S.importing = false; render();
}

function registrarHistorial(accion, entidad, cod, nombre) {
  const entry = { ts: new Date().toISOString(), accion, entidad, cod: cod||'', nombre: nombre||'' };
  // Supabase (fire-and-forget)
  if (S.sbClient) S.sbClient.from('historial').insert([entry]).then(()=>{}).catch(()=>{});
  // localStorage fallback
  try {
    const h = JSON.parse(localStorage.getItem('padron_historial')||'[]');
    h.unshift(entry); if(h.length>300) h.splice(300);
    localStorage.setItem('padron_historial', JSON.stringify(h));
  } catch(e) {}
}
function getHistorial() {
  try { return JSON.parse(localStorage.getItem('padron_historial') || '[]'); } catch(e) { return []; }
}
async function getHistorialFromDB() {
  if (!S.sbClient) return getHistorial();
  const { data, error } = await S.sbClient.from('historial').select('*').order('ts',{ascending:false}).limit(300);
  if (error || !data) return getHistorial();
  return data;
}

}

/* =====================================================================
   BUSQUEDA GLOBAL
   ===================================================================== */
function buildSearchModal() {
  const q = S.searchQuery.toLowerCase().trim();
  let results = [];
  if (q.length >= 2) {
    const ig = RAW.iglesias.filter(i=>i.nombre.toLowerCase().includes(q)||(i.cod||'').toLowerCase().includes(q)||(i.pastor||'').toLowerCase().includes(q)).slice(0,6).map(i=>({tipo:'Iglesia',cod:i.cod,nombre:i.nombre,sub:i.distrito||'',nav:'iglesias'}));
    const pa = RAW.pastores.filter(p=>p.nombre.toLowerCase().includes(q)||(p.distrito||'').toLowerCase().includes(q)).slice(0,4).map(p=>({tipo:'Pastor',cod:p.cod,nombre:p.nombre,sub:p.distrito||'',nav:'pastores'}));
    const di = RAW.distritos.filter(d=>d.nombre.toLowerCase().includes(q)||(d.cod||'').toLowerCase().includes(q)).slice(0,3).map(d=>({tipo:'Distrito',cod:d.cod,nombre:d.nombre,sub:d.zona||'',nav:'distritos'}));
    const zo = RAW.zonas.filter(z=>z.nombre.toLowerCase().includes(q)||(z.cod||'').toLowerCase().includes(q)).slice(0,2).map(z=>({tipo:'Zona',cod:z.cod,nombre:z.nombre,sub:'',nav:'zonas'}));
    results = [...ig,...pa,...di,...zo];
  }
  const entColor = { Iglesia:'#d4a820', Pastor:'#3a6ab0', Distrito:'#2d5090', Zona:'#1e3564' };
  const items = results.map((r,i)=>`<button data-search-nav="${r.nav}" data-search-val="${escHtml(r.cod)}" style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;border:none;background:transparent;cursor:pointer;border-radius:8px;text-align:left;" onmouseover="this.style.background='#f0f2f7'" onmouseout="this.style.background='transparent'">
    <span style="background:${entColor[r.tipo]||'#6b7280'}20;color:${entColor[r.tipo]||'#6b7280'};border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;flex-shrink:0;">${r.tipo}</span>
    <span style="flex:1;font-size:13px;font-weight:500;color:#1a2340;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(r.nombre)}</span>
    ${r.sub?`<span style="font-size:12px;color:#9ca3af;white-space:nowrap;">${escHtml(r.sub)}</span>`:''}
  </button>`).join('');
  return `<div id="search-bg" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;">
    <div style="background:white;border-radius:16px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .15s ease;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid #f0f2f7;display:flex;align-items:center;gap:10px;">
        <span style="color:#9ca3af;">${icons.search}</span>
        <input id="search-input" value="${escHtml(S.searchQuery)}" placeholder="Buscar iglesia, pastor, distrito..." autofocus style="flex:1;border:none;outline:none;font-size:15px;color:#1a2340;background:transparent;" />
        <button id="btn-search-close" style="background:transparent;border:none;cursor:pointer;color:#9ca3af;padding:4px;">${icons.x}</button>
      </div>
      <div style="max-height:380px;overflow-y:auto;padding:8px;">
        ${q.length<2 ? '<div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px;">Escribe al menos 2 caracteres...</div>' : results.length ? items : '<div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px;">Sin resultados para "'+escHtml(S.searchQuery)+'"</div>'}
      </div>
      <div style="padding:10px 20px;border-top:1px solid #f0f2f7;font-size:11px;color:#c5cbe0;">Ctrl+K para abrir &bull; Esc para cerrar</div>
    </div>
  </div>`;
}

/* =====================================================================
   EXPORTAR EXCEL
   ===================================================================== */
function exportarExcel() {
  if (S.view !== 'iglesias' && S.view !== 'pastores') { showToast('Exportacion no disponible en esta vista','error'); return; }
  const wb = XLSX.utils.book_new();
  if (S.view === 'iglesias') {
    const data = getFilteredIglesias().map(i=>({Codigo:i.cod,Nombre:i.nombre,Pastor:i.pastor||'',Zona:i.zona||'',Distrito:i.distrito||'',Drive:i.carpeta_drive||''}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Iglesias');
  } else if (S.view === 'pastores') {
    const data = getFilteredPastores().map(p=>({Codigo:p.cod,Nombre:p.nombre,Rol:p.rol||'pastor',Estado:p.estado||'ordenado',Telefono:p.telefono||'',Email:p.email||'',Zona:p.zona||'',Distrito:p.distrito||'',PastorPrincipal:p.pastor_principal_cod?RAW.pastores.find(x=>x.cod===p.pastor_principal_cod)?.nombre||'':'',IglesiaPlantando:p.iglesia_asignada_cod?RAW.iglesias.find(x=>x.cod===p.iglesia_asignada_cod)?.nombre||'':''}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Pastores');
  }
  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Padron_${S.view}_${ts}.xlsx`);
}


/* =====================================================================
   BOOT
   ===================================================================== */
async function loadAppData() {
  if(S.sbClient){
    try{
      const[zR,dR,iR,pR,cfgR,flujoR]=await Promise.all([
        S.sbClient.from('zonas').select('*'),
        S.sbClient.from('distritos').select('*'),
        S.sbClient.from(S.sbTable).select('*').order('nombre'),
        S.sbClient.from('pastores').select('*').order('nombre'),
        S.sbClient.from('configuracion').select('valor').eq('id','campos_iglesias').maybeSingle(),
        S.sbClient.from('configuracion').select('valor').eq('id','flujo_congregacion').maybeSingle(),
      ]);
      if(!zR.error&&zR.data?.length)RAW.zonas=zR.data;
      if(!dR.error&&dR.data?.length)RAW.distritos=dR.data;
      if(!iR.error&&iR.data?.length)RAW.iglesias=iR.data;
      if(!pR.error&&pR.data?.length)RAW.pastores=pR.data;
      if(!cfgR.error&&cfgR.data?.valor)S.camposCustom=cfgR.data.valor||[];
      if(!flujoR.error&&flujoR.data?.valor)S._flujoCfg=flujoR.data.valor;
      recomputeCounts();
    }catch(e){console.warn('Error cargando datos',e);S.loadError='No se pudieron cargar los datos. Verifica la conexión a Supabase.';}
  }else{
    try{const res=await fetch('./data/iglesias.json');RAW=await res.json();recomputeCounts();}
    catch(e){console.warn('Sin datos locales',e);}
  }
  S.loaded=true;
}

async function init() {
  const url=S.sbUrl||SB_URL_DEFAULT; const key=S.sbKey||SB_KEY_DEFAULT;
  if(window.supabase&&url&&key){try{S.sbClient=window.supabase.createClient(url,key);S.sbUrl=url;S.sbKey=key;S.sbConnected=true;}catch(e){console.warn('Error Supabase',e);}}
  document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();S.showSearch=true;S.searchQuery='';render();setTimeout(()=>document.getElementById('search-input')?.focus(),50);} if(e.key==='Escape'&&S.showSearch){S.showSearch=false;render();} });
  window.addEventListener('resize',()=>{const open=window.innerWidth>=768;if(open!==S.sidebarOpen){S.sidebarOpen=open;render();}});
  if(S.sbClient){
    try {
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const isRecovery = hashParams.get('type') === 'recovery';
      if(isRecovery){ S.loginResetMode=true; }
      const { data: { session } } = await S.sbClient.auth.getSession();
      if(session?.user && !isRecovery){
        S.currentUser = session.user;
        await loadProfile(session.user.id);
        await loadAppData();
      }
      // Escuchar cambios de auth
      S.sbClient.auth.onAuthStateChange(async (event, session) => {
        if(event==='SIGNED_OUT'){S.currentUser=null;S.currentProfile=null;S.loaded=false;render();}
        if(event==='PASSWORD_RECOVERY'){S.loginResetMode=true;S.authLoading=false;render();}
        if(event==='SIGNED_IN'&&session?.user&&!S.currentUser&&!S.loginResetMode){S.currentUser=session.user;await loadProfile(session.user.id);await loadAppData();render();}
      });
    } catch(e) { console.warn('Error verificando sesión',e); }
  }
  S.authLoading=false;
  render();
}
init();
</script>
