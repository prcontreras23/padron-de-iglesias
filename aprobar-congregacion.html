<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aprobar Solicitud — Asoc. Dom. Sureste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(30,53,100,.10);max-width:600px;width:100%;overflow:hidden}
.header{background:#1e3564;padding:28px 32px}.header h1{color:white;font-size:22px;margin-bottom:4px}.header p{color:#93c5fd;font-size:13px}
.body{padding:32px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:16px}
.badge.paso{background:#eef2ff;color:#1e3564}
table{width:100%;border-collapse:collapse;font-size:14px;margin:16px 0}
td{padding:9px 0;border-bottom:1px solid #f0f2f7}td:first-child{color:#6b7280;width:150px}td:last-child{color:#1a2340;font-weight:500}
textarea{width:100%;padding:11px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:70px;margin:12px 0}
textarea:focus{border-color:#1e3564}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.btn{padding:13px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-ok{background:#166534;color:white}.btn-ok:hover{background:#14532d}
.btn-no{background:#991b1b;color:white}.btn-no:hover{background:#7f1d1d}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{display:none;padding:14px;border-radius:8px;margin-top:16px;font-size:14px}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.loading{text-align:center;padding:40px;color:#6b7280}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Aprobación — Paso 1 de 4</h1>
    <p>Asociación Dominicana del Sureste · Sistema de Gestión</p>
  </div>
  <div class="body" id="body">
    <div class="loading">Cargando solicitud…</div>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) document.getElementById('body').innerHTML = '<p style="color:#991b1b">Token no válido.</p>';

async function cargar() {
  const r = await fetch('/api/get-solicitudes?token=' + token);
  if (!r.ok) { document.getElementById('body').innerHTML = '<p style="color:#991b1b">Solicitud no encontrada.</p>'; return; }
  const s = await r.json();
  if (s.estado !== 'pendiente_francis') {
    document.getElementById('body').innerHTML = `<div class="msg ok" style="display:block">Esta solicitud ya fue procesada (estado: ${s.estado.replace(/_/g,' ')}).</div>`;
    return;
  }
  document.getElementById('body').innerHTML = `
    <span class="badge paso">📋 Revisión del Director</span>
    <p style="color:#374151;margin-bottom:8px;">Revisa los datos y decide si apruebas la solicitud para continuar el proceso:</p>
    <table>
      <tr><td>Congregación</td><td><strong style="color:#1e3564">${s.nombre_congregacion}</strong></td></tr>
      <tr><td>Pastor</td><td>${s.nombre_pastor}</td></tr>
      ${s.telefono_pastor?`<tr><td>Teléfono</td><td>${s.telefono_pastor}</td></tr>`:''}
      ${s.zona?`<tr><td>Zona</td><td>${s.zona}</td></tr>`:''}
      ${s.distrito?`<tr><td>Distrito</td><td>${s.distrito}</td></tr>`:''}
      ${s.direccion?`<tr><td>Dirección</td><td>${s.direccion}</td></tr>`:''}
      ${s.iglesia_madre?`<tr><td>Iglesia/grupo madre</td><td>${s.iglesia_madre}</td></tr>`:''}
      ${s.cantidad_miembros?`<tr><td>Miembros aprox.</td><td>${s.cantidad_miembros}</td></tr>`:''}
      ${s.lugar_reunion?`<tr><td>Lugar de reunión</td><td>${s.lugar_reunion}</td></tr>`:''}
      <tr><td>Líderes identificados</td><td>${s.lideres_identificados?'Sí':'No'}</td></tr>
      ${s.notas?`<tr><td>Notas</td><td>${s.notas}</td></tr>`:''}
    </table>
    <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-top:12px">Notas (opcional)</label>
    <textarea id="notas" placeholder="Observaciones para el registro…"></textarea>
    <div class="btns">
      <button class="btn btn-ok" id="btn-ok" onclick="decidir('aprobar')">✅ Aprobar</button>
      <button class="btn btn-no" id="btn-no" onclick="decidir('rechazar')">❌ Rechazar</button>
    </div>
    <div class="msg" id="msg"></div>`;
}

async function decidir(decision) {
  document.getElementById('btn-ok').disabled = true;
  document.getElementById('btn-no').disabled = true;
  const notas = document.getElementById('notas').value;
  const r = await fetch('/api/aprobar-congregacion', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ token, decision, notas })
  });
  const data = await r.json();
  const msg = document.getElementById('msg');
  msg.className = r.ok ? 'msg ok' : 'msg err';
  msg.textContent = r.ok
    ? (decision === 'aprobar' ? '✅ Aprobado. César Cabrera ha sido notificado.' : '❌ Solicitud rechazada.')
    : ('Error: ' + (data.error || 'Error desconocido'));
  msg.style.display = 'block';
}

cargar();
</script>
</body>
</html>
