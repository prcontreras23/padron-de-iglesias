<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SunPlus — Asoc. Dom. Sureste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(30,53,100,.10);max-width:600px;width:100%;overflow:hidden}
.header{background:#1e3564;padding:28px 32px}.header h1{color:white;font-size:22px;margin-bottom:4px}.header p{color:#93c5fd;font-size:13px}
.body{padding:32px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:16px;background:#eef2ff;color:#1e3564}
table{width:100%;border-collapse:collapse;font-size:14px;margin:16px 0}
td{padding:9px 0;border-bottom:1px solid #f0f2f7}td:first-child{color:#6b7280;width:150px}td:last-child{color:#1a2340;font-weight:500}
.group{margin:16px 0}label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}.req{color:#ef4444}
input,textarea{width:100%;padding:11px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:#1e3564}textarea{resize:vertical;min-height:70px}
.check-row{display:flex;align-items:center;gap:10px;padding:12px;background:#f8f9fc;border-radius:8px;margin:12px 0;cursor:pointer}
.check-row input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.btn{width:100%;padding:13px;background:#1e3564;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{background:#2d5090}.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{display:none;padding:14px;border-radius:8px;margin-top:16px;font-size:14px}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Paso 2 de 4 — SunPlus</h1>
    <p>Asociación Dominicana del Sureste · Sistema de Gestión</p>
  </div>
  <div class="body" id="body"><div style="text-align:center;padding:40px;color:#6b7280">Cargando…</div></div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
async function cargar() {
  const r = await fetch('/api/get-solicitudes?token=' + token);
  if (!r.ok) { document.getElementById('body').innerHTML = '<p style="color:#991b1b">Solicitud no encontrada.</p>'; return; }
  const s = await r.json();
  if (s.estado !== 'pendiente_cesar') {
    document.getElementById('body').innerHTML = `<div class="msg ok" style="display:block">Este paso ya fue completado (estado: ${s.estado.replace(/_/g,' ')}).</div>`;
    return;
  }
  document.getElementById('body').innerHTML = `
    <span class="badge">📋 César Cabrera — SunPlus</span>
    <p style="color:#374151;margin-bottom:8px;">Registra esta congregación en SunPlus y asígnale un código:</p>
    <table>
      <tr><td>Congregación</td><td><strong style="color:#1e3564">${s.nombre_congregacion}</strong></td></tr>
      <tr><td>Pastor</td><td>${s.nombre_pastor}</td></tr>
      ${s.zona?`<tr><td>Zona</td><td>${s.zona}</td></tr>`:''}
      ${s.distrito?`<tr><td>Distrito</td><td>${s.distrito}</td></tr>`:''}
      ${s.descripcion?`<tr><td>Descripción</td><td>${s.descripcion}</td></tr>`:''}
    </table>
    <div class="group">
      <label>Código asignado <span class="req">*</span></label>
      <input type="text" id="codigo" placeholder="Ej: TALMAR01" required style="text-transform:uppercase">
    </div>
    <label class="check-row"><input type="checkbox" id="sunplus">Confirmo que la congregación está registrada en SunPlus</label>
    <div class="group"><label>Notas (opcional)</label><textarea id="notas" placeholder="Observaciones…"></textarea></div>
    <button class="btn" id="btn" onclick="enviar()">Confirmar y continuar</button>
    <div class="msg" id="msg"></div>`;
}

async function enviar() {
  const codigo = document.getElementById('codigo').value.trim().toUpperCase();
  if (!codigo) { alert('El código es requerido'); return; }
  document.getElementById('btn').disabled = true;
  const r = await fetch('/api/paso-cesar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token, codigo_asignado: codigo, sunplus_confirmado: document.getElementById('sunplus').checked, notas: document.getElementById('notas').value })
  });
  const data = await r.json();
  const msg = document.getElementById('msg');
  msg.className = r.ok ? 'msg ok' : 'msg err';
  msg.textContent = r.ok ? '✅ Confirmado. Carlos Melo ha sido notificado para crear la cuenta en Ecclesia.' : ('Error: ' + (data.error||''));
  msg.style.display = 'block';
}
cargar();
</script>
</body>
</html>
