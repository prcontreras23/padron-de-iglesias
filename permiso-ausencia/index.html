<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="/logo.png">
<title>Solicitud de Permiso de Ausencia — Asoc. Dom. Sureste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(30,53,100,.10);max-width:560px;width:100%;overflow:hidden}
.header{background:#1e3564;padding:28px 32px}
.header h1{color:white;font-size:22px;margin-bottom:4px}
.header p{color:#93c5fd;font-size:13px}
.body{padding:32px;display:flex;flex-direction:column;gap:16px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:white}
input:focus,select:focus,textarea:focus{border-color:#1e3564}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.required{color:#ef4444;margin-left:2px}
.motivos{display:flex;flex-direction:column;gap:8px}
.motivo-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s}
.motivo-opt:hover{border-color:#1e3564;background:#f8f9ff}
.motivo-opt.selected{border-color:#1e3564;background:#eef2ff}
.motivo-opt input[type=radio]{accent-color:#1e3564;width:16px;height:16px;flex-shrink:0}
.motivo-opt span{font-size:14px;color:#1a2340;font-weight:500}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:#1e3564;color:white;margin-top:4px}
.btn:hover{background:#162a4d}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{padding:14px;border-radius:8px;font-size:14px;display:none}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.historial-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:10px;border:1px solid #e8eaf2;border-radius:6px;margin-bottom:8px;background:#fafbff;font-size:13px;align-items:center}
.historial-row-header{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:10px;background:#f3f4f6;border-radius:6px;margin-bottom:8px;font-weight:600;color:#6b7280;font-size:12px}
.estado-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-weight:600;font-size:11px}
.estado-badge.pendiente{background:#fef9c3;color:#a16207}
.estado-badge.aprobado{background:#dcfce7;color:#166534}
.estado-badge.rechazado{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div class="card">
  <div class="header" style="display:flex;align-items:center;gap:16px;">
    <img src="/logo.png" alt="Iglesia Adventista del Séptimo Día" style="width:48px;height:48px;flex-shrink:0;background:white;border-radius:50%;padding:3px;" />
    <div><h1>Solicitud de Permiso de Ausencia</h1>
    <p>Asociación Dominicana del Sureste · Oficina de Secretaría</p></div>
  </div>
  <div class="body" id="form-body">
    <div id="historial-section" style="display:none;margin-bottom:24px;border-top:1px solid #e8eaf2;padding-top:24px;">
      <h2 style="font-size:16px;font-weight:700;color:#1a2340;margin-bottom:12px;">Mis Solicitudes Anteriores</h2>
      <div id="historial-tabla" style="width:100%;border-collapse:collapse;font-size:13px;"></div>
    </div>
    <div>
      <label>Busca tu nombre <span class="required">*</span></label>
      <input id="nombre" type="text" placeholder="Escribe tu nombre o apellido…" autocomplete="off" />
      <div id="lista-pastores" style="display:none;position:absolute;background:white;border:1.5px solid #e8eaf2;border-top:none;border-radius:0 0 8px 8px;width:calc(100% - 64px);max-height:200px;overflow-y:auto;margin-top:-8px;z-index:10;"></div>
    </div>
    <div>
      <label>Correo electrónico <span class="required">*</span></label>
      <input id="email" type="email" placeholder="correo@ejemplo.com" />
      <p style="font-size:12px;color:#9ca3af;margin-top:4px;">Si tu correo está registrado se autocompletará. Puedes editarlo o agregarlo si no lo tienes; quedará guardado en tu perfil.</p>
    </div>
    <div class="row">
      <div>
        <label>Fecha de solicitud <span class="required">*</span></label>
        <input id="fecha_solicitud" type="date" />
      </div>
      <div>
        <label>Fecha de ausencia <span class="required">*</span></label>
        <input id="fecha_ausencia" type="date" />
      </div>
    </div>
    <div>
      <label>Motivo de ausencia <span class="required">*</span></label>
      <div class="motivos">
        <label class="motivo-opt selected"><input type="radio" name="motivo" value="enfermedad" checked /><span>Enfermedad</span></label>
        <label class="motivo-opt"><input type="radio" name="motivo" value="cita_medica" /><span>Cita Médica</span></label>
        <label class="motivo-opt"><input type="radio" name="motivo" value="asuntos_familiares" /><span>Asuntos Familiares</span></label>
        <label class="motivo-opt"><input type="radio" name="motivo" value="asuntos_oficiales" /><span>Asuntos Oficiales</span></label>
        <label class="motivo-opt"><input type="radio" name="motivo" value="asuntos_personales" /><span>Asuntos Personales</span></label>
      </div>
    </div>
    <div>
      <label>Lugar donde irá</label>
      <input id="lugar" type="text" placeholder="Lugar de destino" />
    </div>
    <div>
      <label>Observaciones</label>
      <textarea id="observaciones" placeholder="Información adicional…"></textarea>
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn" id="btn-enviar" onclick="enviar()">Enviar Solicitud</button>
  </div>
</div>

<script>
const SB_URL = 'https://gvbknabnrlliofbchczv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2YmtuYWJucmxsaW9mYmNoY3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjg3MTcsImV4cCI6MjA5NjkwNDcxN30.v7IXmkGpidbpCPZsDh_wFh_pLsP13QhTueYtiLfkH9Q';
let pastoresList = []; // { cod, nombre, email }
let pastoresMap = {}; // nombre -> { cod, email }
let selectedPastor = null;

async function cargarPastores() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/pastores?select=cod,nombre,email,telefono&order=nombre`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    pastoresList = await r.json();
    pastoresList.forEach(p => {
      pastoresMap[p.nombre] = { cod: p.cod, email: p.email || '', telefono: p.telefono || '' };
    });
  } catch(e) {
    console.error('Error cargando pastores:', e);
  }
}

function mostrarLista(query = '') {
  const lista = document.getElementById('lista-pastores');
  const input = document.getElementById('nombre');

  if (!query.trim()) {
    lista.style.display = 'none';
    return;
  }

  const q = query.toLowerCase();
  const filtered = pastoresList.filter(p =>
    p.nombre.toLowerCase().includes(q) ||
    (p.email || '').toLowerCase().includes(q)
  ).slice(0, 10);

  if (filtered.length === 0) {
    lista.innerHTML = '<div style="padding:10px 14px;color:#9ca3af;font-size:13px;">No encontrado</div>';
    lista.style.display = 'block';
    return;
  }

  lista.innerHTML = filtered.map((p, i) => `
    <div data-pastor-idx="${i}" style="padding:10px 14px;border-bottom:1px solid #f0f2f7;cursor:pointer;background:white;transition:background .1s;" onmouseover="this.style.background='#f8f9ff'" onmouseout="this.style.background='white'">
      <div style="font-weight:500;color:#1a2340;">${p.nombre}</div>
      <div style="font-size:12px;color:#9ca3af;">${p.email || '(sin email registrado)'}</div>
    </div>
  `).join('');
  lista.style.display = 'block';

  lista.querySelectorAll('[data-pastor-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const p = filtered[parseInt(el.dataset.pastorIdx)];
      document.getElementById('nombre').value = p.nombre;
      document.getElementById('email').value = p.email || '';
      selectedPastor = p;
      lista.style.display = 'none';
      cargarHistorialPastor(p.nombre, p.cod);
    });
  });
}

document.getElementById('nombre').addEventListener('input', (e) => {
  mostrarLista(e.target.value);
});

document.getElementById('nombre').addEventListener('blur', () => {
  setTimeout(() => {
    document.getElementById('lista-pastores').style.display = 'none';
  }, 150);
});

document.getElementById('nombre').addEventListener('focus', (e) => {
  if (e.target.value.trim()) mostrarLista(e.target.value);
});

async function guardarEmailSiNecesario(nombre, email) {
  const p = selectedPastor || pastoresMap[nombre];
  if (!p || !p.cod || p.email === email) return; // sin cambios
  try {
    await fetch(`${SB_URL}/rest/v1/pastores?cod=eq.${encodeURIComponent(p.cod)}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ email })
    });
    if (selectedPastor) selectedPastor.email = email;
    if (pastoresMap[nombre]) pastoresMap[nombre].email = email;
  } catch(e) {
    console.error('No se pudo actualizar el email del perfil:', e);
  }
}

// Selección visual de motivo
document.querySelectorAll('.motivo-opt input[type=radio]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('.motivo-opt').forEach(el => el.classList.remove('selected'));
    r.closest('.motivo-opt').classList.add('selected');
  });
});

// Fecha por defecto: hoy
document.getElementById('fecha_solicitud').value = new Date().toISOString().slice(0, 10);

async function cargarHistorialPastor(nombre, cod) {
  try {
    const filtro = cod ? `pastor_cod=eq.${encodeURIComponent(cod)}` : `nombre=eq.${encodeURIComponent(nombre)}`;
    const r = await fetch(`${SB_URL}/rest/v1/permisos_ausencia?${filtro}&select=*&order=fecha_solicitud.desc`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const solicitudes = await r.json();

    if (!solicitudes.length) {
      document.getElementById('historial-section').style.display = 'none';
      return;
    }

    const formatFecha = (d) => new Date(d + 'T12:00:00').toLocaleDateString('es-DO', { day:'2-digit', month:'short', year:'numeric' });

    let html = '<div class="historial-row-header"><div>Fecha de Ausencia</div><div>Motivo</div><div>Estado</div></div>';
    html += solicitudes.map(s => `
      <div class="historial-row">
        <div>${formatFecha(s.fecha_ausencia)}</div>
        <div style="color:#6b7280;">${s.motivo.replace(/_/g, ' ').toLowerCase()}</div>
        <div><span class="estado-badge ${s.estado}">${s.estado.charAt(0).toUpperCase() + s.estado.slice(1)}</span></div>
      </div>
    `).join('');

    document.getElementById('historial-tabla').innerHTML = html;
    document.getElementById('historial-section').style.display = 'block';
  } catch(e) {
    console.error('Error cargando historial:', e);
  }
}

// Cargar pastores al inicio
cargarPastores();

async function enviar() {
  const nombre          = document.getElementById('nombre').value.trim();
  const email           = document.getElementById('email').value.trim();
  const fecha_solicitud = document.getElementById('fecha_solicitud').value;
  const fecha_ausencia  = document.getElementById('fecha_ausencia').value;
  const motivo          = document.querySelector('input[name=motivo]:checked')?.value || 'enfermedad';
  const lugar           = document.getElementById('lugar').value.trim();
  const observaciones   = document.getElementById('observaciones').value.trim();

  if (!nombre) {
    mostrar('Selecciona tu nombre de la lista.', 'err');
    return;
  }
  if (!email) {
    mostrar('No se encontró email para este pastor. Contacta a la secretaría.', 'err');
    return;
  }
  if (!fecha_solicitud || !fecha_ausencia) {
    mostrar('Completa las fechas de solicitud y ausencia.', 'err');
    return;
  }

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  ocultarMsg();

  try {
    await guardarEmailSiNecesario(nombre, email);
    const pastor_cod = (pastoresMap[nombre] && pastoresMap[nombre].cod) || (selectedPastor && selectedPastor.cod) || null;
    const r = await fetch('/api/nueva-permiso', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accion:'crear', pastor_cod, nombre, email, fecha_solicitud, fecha_ausencia, motivo, lugar, observaciones })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error al enviar');

    document.getElementById('form-body').innerHTML = `
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:64px;margin-bottom:20px;">✅</div>
        <h2 style="font-size:22px;font-weight:700;color:#1a2340;margin-bottom:12px;">¡Solicitud enviada!</h2>
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px;margin-bottom:16px;">
          <p style="font-size:15px;color:#166534;margin:0;line-height:1.5;">
            <strong>Hemos recibido tu solicitud.</strong><br>
            Recibirás la confirmación de aprobación o rechazo en tu correo:<br>
            <span style="font-weight:700;color:#15803d;">${email}</span>
          </p>
        </div>
        <p style="font-size:13px;color:#6b7280;margin:0;margin-bottom:20px;">Revisa tu bandeja de entrada (y spam) en los próximos días.</p>
        <a href="https://wa.me/8296799031?text=Saludos%20pastor%20Francis%20acabo%20de%20realizar%20una%20solicitud%20de%20permiso%20de%20salida" target="_blank" style="display:inline-block;background:#25d366;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;border:none;cursor:pointer;">📲 Notificar por WhatsApp</a>
      </div>`;
    setTimeout(() => { window.open('https://wa.me/8296799031?text=Saludos%20pastor%20Francis%20acabo%20de%20realizar%20una%20solicitud%20de%20permiso%20de%20salida', '_blank'); }, 500);
  } catch(e) {
    mostrar(e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Enviar Solicitud';
  }
}

function mostrar(msg, tipo) {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className = 'msg ' + tipo;
  el.style.display = 'block';
}
function ocultarMsg() {
  const el = document.getElementById('msg');
  el.style.display = 'none';
}
</script>
</body>
</html>
