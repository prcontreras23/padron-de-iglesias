<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revisar Solicitud — Asociación Dominicana del Sureste</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(30,53,100,.12); width: 100%; max-width: 520px; overflow: hidden; }
  .header { background: #1e3564; padding: 28px 32px; }
  .header h1 { color: white; font-size: 22px; font-weight: 700; }
  .header p { color: #93c5fd; font-size: 13px; margin-top: 4px; }
  .body { padding: 28px 32px; }
  .row { display: flex; padding: 10px 0; border-bottom: 1px solid #f0f2f8; font-size: 14px; }
  .row .lbl { color: #6b7280; width: 120px; flex-shrink: 0; }
  .row .val { color: #1a2340; font-weight: 500; }
  .sistema-badge { display: inline-block; background: #eef2ff; color: #1e3564; font-weight: 700; padding: 2px 12px; border-radius: 20px; }
  .section-title { font-size: 13px; font-weight: 700; color: #1a2340; margin: 22px 0 10px; text-transform: uppercase; letter-spacing: .06em; }
  textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e8eaf2; border-radius: 9px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 70px; outline: none; margin-bottom: 14px; }
  textarea:focus { border-color: #1e3564; }
  .btns { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .btn-ap { background: #16a34a; color: white; }
  .btn-ap:hover { background: #15803d; }
  .btn-rch { background: #dc2626; color: white; }
  .btn-rch:hover { background: #b91c1c; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .msg { margin-top: 16px; padding: 16px; border-radius: 9px; font-size: 14px; text-align: center; }
  .msg.success { background: #dcfce7; color: #166534; }
  .msg.error   { background: #fee2e2; color: #7f1d1d; }
  .msg.warning { background: #fff8e6; color: #854d0e; }
  .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Revisar Solicitud</h1>
    <p>Asociación Dominicana del Sureste</p>
  </div>
  <div class="body" id="contenido">
    <div class="loading">Cargando solicitud…</div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

async function cargar() {
  if (!token) { mostrarError('Enlace no válido. Verifica que copiaste el enlace completo.'); return; }
  try {
    const res  = await fetch(`/api/status?token=${token}`);
    const data = await res.json();
    if (!res.ok) { mostrarError(data.error || 'Enlace no válido o expirado.'); return; }
    renderSolicitud(data);
  } catch (e) {
    mostrarError('Error de conexión. Intenta de nuevo.');
  }
}

function renderSolicitud(sol) {
  const apMia = sol.aprobaciones?.find(a => a._esPropia);
  const yaActuo = apMia && apMia.estado !== 'pendiente';
  const solCerrada = sol.estado !== 'pendiente';

  document.getElementById('contenido').innerHTML = `
    <p style="font-size:14px;color:#6b7280;margin-bottom:16px;">Revisa los datos y decide si apruebas o rechazas el acceso.</p>
    <div class="row"><span class="lbl">Solicitante</span><span class="val">${esc(sol.nombre)}</span></div>
    <div class="row"><span class="lbl">Correo</span><span class="val">${esc(sol.email)}</span></div>
    ${sol.cargo ? `<div class="row"><span class="lbl">Cargo</span><span class="val">${esc(sol.cargo)}</span></div>` : ''}
    <div class="row"><span class="lbl">Sistema</span><span class="val"><span class="sistema-badge">${esc(sol.sistema)}</span></span></div>
    ${sol.motivo ? `<div class="row"><span class="lbl">Motivo</span><span class="val">${esc(sol.motivo)}</span></div>` : ''}
    <div class="row"><span class="lbl">Fecha</span><span class="val">${new Date(sol.created_at).toLocaleString('es-DO')}</span></div>

    <div class="section-title">Estado de aprobaciones</div>
    ${(sol.aprobaciones||[]).map(a => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f2f8;">
        <span style="font-size:14px;color:#374151;font-weight:500;">${esc(a.aprobador)}</span>
        <span style="font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;${
          a.estado==='aprobado'  ? 'background:#dcfce7;color:#166534;' :
          a.estado==='rechazado' ? 'background:#fee2e2;color:#7f1d1d;' :
                                   'background:#f3f4f6;color:#6b7280;'
        }">${a.estado==='aprobado'?'✅ Aprobado':a.estado==='rechazado'?'❌ Rechazado':'⏳ Pendiente'}</span>
      </div>`).join('')}

    ${solCerrada
      ? `<div class="msg ${sol.estado==='aprobada'?'success':'error'}" style="margin-top:20px;">
           ${sol.estado==='aprobada' ? '✅ Esta solicitud fue <strong>aprobada</strong> por todos los aprobadores.' : '❌ Esta solicitud fue <strong>rechazada</strong>.'}
         </div>`
      : yaActuo
        ? `<div class="msg warning" style="margin-top:20px;">Ya registraste tu decisión para esta solicitud.</div>`
        : `<div style="margin-top:22px;">
             <div class="section-title">Tu decisión</div>
             <textarea id="comentario" placeholder="Comentario (opcional, especialmente si rechazas)"></textarea>
             <div class="btns">
               <button class="btn btn-ap" id="btn-ap" onclick="decidir('aprobar')">✅ Aprobar</button>
               <button class="btn btn-rch" id="btn-rch" onclick="decidir('rechazar')">❌ Rechazar</button>
             </div>
             <div id="msg-accion"></div>
           </div>`
    }`;
}

async function decidir(accion) {
  const comentario = document.getElementById('comentario')?.value?.trim();
  document.getElementById('btn-ap').disabled  = true;
  document.getElementById('btn-rch').disabled = true;
  const msgEl = document.getElementById('msg-accion');

  try {
    const res  = await fetch('/api/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, accion, comentario }),
    });
    const data = await res.json();
    if (!res.ok && res.status !== 409) throw new Error(data.error || 'Error desconocido');

    if (res.status === 409) {
      msgEl.innerHTML = `<div class="msg warning">${data.error}</div>`;
    } else if (data.resultado === 'aprobada') {
      msgEl.innerHTML = `<div class="msg success">✅ ¡Todos aprobaron! El solicitante ha sido notificado.</div>`;
    } else if (data.resultado === 'rechazada') {
      msgEl.innerHTML = `<div class="msg error">❌ Solicitud rechazada. El solicitante ha sido notificado.</div>`;
    } else {
      msgEl.innerHTML = `<div class="msg success">✅ Aprobación registrada. ${data.pendientes} aprobador${data.pendientes!==1?'es':''} pendiente${data.pendientes!==1?'s':''}.</div>`;
    }
  } catch (e) {
    msgEl.innerHTML = `<div class="msg error">Error: ${e.message}</div>`;
    document.getElementById('btn-ap').disabled  = false;
    document.getElementById('btn-rch').disabled = false;
  }
}

function mostrarError(msg) {
  document.getElementById('contenido').innerHTML = `<div class="msg error" style="margin:0;">${msg}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

cargar();
</script>
</body>
</html>
