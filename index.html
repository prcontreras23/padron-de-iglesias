/* =====================================================================
   AUTO-CODIGO
   ===================================================================== */
function nextZonaCod() {
  const nums = RAW.zonas.map(z => parseInt(z.cod.replace(/\D/g,''))||0);
  return 'Z' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(2,'0');
}
function nextDistritoCod() {
  const nums = RAW.distritos.map(d => parseInt(d.cod.replace(/\D/g,''))||0);
  return 'DT' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3,'0');
}
function nextPastorCod() {
  const nums = RAW.pastores.map(p => parseInt(p.cod.replace(/\D/g,''))||0);
  return 'P' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3,'0');
}

/* =====================================================================
   FILTER HELPERS
   ===================================================================== */
function getFilteredIglesias() {
  let list = RAW.iglesias;
  if (S.fZona !== 'all') list = list.filter(i => i.codZona === S.fZona);
  if (S.fDistrito !== 'all') list = list.filter(i => i.codDistrito === S.fDistrito);
  if (S.fPastor !== 'all') list = list.filter(i => (S.fPastor === '__sin_pastor__' ? (!i.pastor||!i.pastor.trim()) : (i.pastor||'') === S.fPastor));
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(i =>
      i.nombre.toLowerCase().includes(q) ||
      i.cod.toLowerCase().includes(q) ||
      (i.pastor||'').toLowerCase().includes(q) ||
      (i.distrito||'').toLowerCase().includes(q)
    );
  }
  // Ordenar
  list = [...list].sort((a,b) => {
    const av = (a[S.sortCol]||'').toLowerCase();
    const bv = (b[S.sortCol]||'').toLowerCase();
    return S.sortDir==='asc' ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
  });
  return list;
}
function getFilteredDistritos() {
  let list = RAW.distritos;
  if (S.fZona !== 'all') list = list.filter(d => d.codZona === S.fZona);
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(d => d.nombre.toLowerCase().includes(q) || d.cod.toLowerCase().includes(q));
  }
  return list;
}
function getFilteredPastores() {
  let list = RAW.pastores;
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.distrito||'').toLowerCase().includes(q) ||
      (p.email||'').toLowerCase().includes(q)
    );
  }
  return [...list].sort((a,b) => a.nombre.localeCompare(b.nombre));
}

function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };

/* ---- CONTENT ROUTER ---- */
function buildContent() {
  if (!S.loaded) return `<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#9ca3af;font-size:14px;">Cargando datos...</div>`;
  if (S.loadError) return `<div style="margin:20px 0;padding:16px 20px;background:#fee2e2;border-radius:12px;color:#b91c1c;font-size:14px;display:flex;align-items:center;gap:12px;"><span style="font-size:20px;">&#9888;</span><div><strong>Error de conexion</strong><br>${escHtml(S.loadError)}<br><button onclick="location.reload()" style="margin-top:8px;padding:6px 14px;border-radius:6px;border:none;background:#b91c1c;color:white;font-size:12px;cursor:pointer;">Reintentar</button></div></div>`;
  switch(S.view) {
    case 'dashboard':     return buildDashboard();
    case 'zonas':         return buildZonas();
    case 'distritos':     return buildDistritos();
    case 'iglesias':      return buildIglesias();
    case 'pastores':      return buildPastores();
    case 'historial':     return buildHistorialView();
    case 'solicitudes':   return buildSolicitudes();
    case 'configuracion': return buildConfiguracion();
    default:              return buildDashboard();
  }
}

/* ---- DASHBOARD ---- */
function buildDashboard() {
  const stat = (num, label, bg, color, iconHtml) => `
  <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);display:flex;align-items:center;gap:16px;border:1px solid #e8eaf2;">

    <div><div style="font-size:32px;font-weight:700;color:#1e3564;line-height:1;">${num}</div><div style="font-size:13px;color:#6b7280;margin-top:2px;">${label}</div></div>
  </div>`;

  // Estadísticas de iglesias vs grupos y pastores ordenados vs licenciados
  const iglesias = RAW.iglesias.filter(i=>i.tipo==='iglesia'||!i.tipo).length;
  const grupos = RAW.iglesias.filter(i=>i.tipo==='grupo').length;
  const ordenados = RAW.pastores.filter(p=>p.estado==='ordenado'||!p.estado).length;
  const licenciados = RAW.pastores.filter(p=>p.estado==='licenciado').length;

  const maxIg = Math.max(...RAW.zonas.map(z => z._igCount||0), 1);
  const colors = ['#1e3564','#2d5090','#d4a820','#3a6ab0','#e8c040','#4a7ac0','#f0d060'];
  const bars = RAW.zonas.map((z,i) => {
    const cnt = z._igCount||0; const pct = Math.max((cnt/maxIg)*100,4);
    return `<div data-nav-zona-ig="${z.cod}" style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <div style="width:56px;font-size:12px;color:#6b7280;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${z.nombre.replace(/ZONA /i,'Z')}</div>
      <div style="flex:1;height:26px;background:#f0f2f7;border-radius:6px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${colors[i%colors.length]};border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:white;min-width:28px;">${cnt}</div></div>
    </div>`;
  }).join('');
  const topD = [...RAW.distritos].sort((a,b)=>b.iglesias-a.iglesias).slice(0,8);
  const topRows = topD.map((d,i) => `
  <div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i<topD.length-1?'border-bottom:1px solid #f0f2f7;':''}">
    <div style="width:24px;height:24px;border-radius:50%;background:${i<3?'#d4a820':'#e8eaf2'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${i<3?'white':'#9ca3af'};flex-shrink:0;">${i+1}</div>
    <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:500;color:#1a2340;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(d.nombre)}</div><div style="font-size:12px;color:#9ca3af;">${escHtml(d.zona)}</div></div>
    <span style="background:#fff8e6;color:#d4a820;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;">${d.iglesias||0}</span>
  </div>`).join('');
  const igSinPastor = RAW.iglesias.filter(i=>!i.pastor||!i.pastor.trim());
  const sinPastor = igSinPastor.length;
  const pastSinDistrito = RAW.pastores.filter(p=>!p.codDistrito);
  const sinDistrito = pastSinDistrito.length;
  const distsSinIg = RAW.distritos.filter(d=>!d.iglesias||d.iglesias===0);
  const distSinIg = distsSinIg.length;

  function buildAlertCard(icon, title, color, bg, action, names) {
    const MAX = 6;
    const shown = names.slice(0, MAX);
    const extra = names.length - MAX;
    const nameList = shown.length
      ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">${shown.map(n=>`<span style="background:rgba(0,0,0,.08);border-radius:20px;padding:1px 8px;font-size:11px;color:${color};">${escHtml(n)}</span>`).join('')}${extra>0?`<span style="font-size:11px;color:${color};padding:1px 6px;">+${extra} más</span>`:''}</div>`
      : '';
    return `<div data-alerta="${action}" style="padding:12px 16px;background:${bg};border-radius:10px;cursor:pointer;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="width:20px;height:20px;border-radius:50%;background:${color};color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon}</span>
        <span style="font-size:13px;font-weight:600;color:${color};flex:1;">${title}</span>
        <span style="font-size:12px;color:${color};">Ver &rsaquo;</span>
      </div>
      ${nameList}
    </div>`;
  }

  const alertItems = [];
  if (sinPastor>0) alertItems.push(buildAlertCard('!',sinPastor+' iglesia'+(sinPastor!==1?'s':'')+' sin pastor asignado','#854d0e','#fef9c3','iglesias-sin-pastor',igSinPastor.map(i=>i.nombre)));
  if (sinDistrito>0) alertItems.push(buildAlertCard('!',sinDistrito+' pastor'+(sinDistrito!==1?'es':'')+' sin distrito asignado','#9a3412','#ffedd5','pastores',pastSinDistrito.map(p=>p.nombre)));
  if (distSinIg>0) alertItems.push(buildAlertCard('i',distSinIg+' distrito'+(distSinIg!==1?'s':'')+' sin iglesias registradas','#1e40af','#dbeafe','distritos',distsSinIg.map(d=>d.nombre)));
  const alertSection = alertItems.length ? '<div style="background:white;border-radius:14px;padding:20px 22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;"><div style="font-size:15px;font-weight:600;color:#1a2340;margin-bottom:14px;">Alertas</div><div style="display:flex;flex-direction:column;gap:10px;">'+alertItems.join('')+'</div></div>' : '';
  return `
  <div style="display:flex;flex-direction:column;gap:20px;">
    ${alertSection}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;">
      ${stat(RAW.zonas.length,'Zonas','#eef2ff','#1e3564',icons.globe)}
      ${stat(RAW.distritos.length,'Distritos','#fff8e6','#d4a820',icons.users)}
      ${stat(RAW.iglesias.length,'Iglesias','#eef2ff','#1e3564',icons.home)}
      ${stat(RAW.pastores.length,'Pastores','#fff8e6','#d4a820',icons.user)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;">
      ${stat(iglesias,'Iglesias','#dbeafe','#1e40af',icons.home)}
      ${stat(grupos,'Grupos','#fef3c7','#92400e',icons.users)}
      ${stat(ordenados,'Pastores Ordenados','#dcfce7','#166534',icons.user)}
      ${stat(licenciados,'Pastores Licenciados','#fed7aa','#92400e',icons.user)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;">
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;">
        <h3 style="font-size:15px;font-weight:600;color:#1a2340;margin-bottom:16px;">Distribución de Iglesias</h3>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;color:#6b7280;">Iglesias</span>
              <span style="font-size:14px;font-weight:600;color:#1e40af;">${iglesias}</span>
            </div>
            <div style="height:12px;background:#f0f2f7;border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${iglesias===0?'0':(iglesias/(iglesias+grupos)*100)}%;background:#1e40af;border-radius:6px;"></div>
            </div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;color:#6b7280;">Grupos</span>
              <span style="font-size:14px;font-weight:600;color:#92400e;">${grupos}</span>
            </div>
            <div style="height:12px;background:#f0f2f7;border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${grupos===0?'0':(grupos/(iglesias+grupos)*100)}%;background:#92400e;border-radius:6px;"></div>
            </div>
          </div>
        </div>
      </div>
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;">
        <h3 style="font-size:15px;font-weight:600;color:#1a2340;margin-bottom:16px;">Estado de Pastores</h3>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;color:#6b7280;">Ordenados</span>
              <span style="font-size:14px;font-weight:600;color:#166534;">${ordenados}</span>
            </div>
            <div style="height:12px;background:#f0f2f7;border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${ordenados===0?'0':(ordenados/(ordenados+licenciados)*100)}%;background:#166534;border-radius:6px;"></div>
            </div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;color:#6b7280;">Licenciados</span>
              <span style="font-size:14px;font-weight:600;color:#b45309;">${licenciados}</span>
            </div>
            <div style="height:12px;background:#f0f2f7;border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${licenciados===0?'0':(licenciados/(ordenados+licenciados)*100)}%;background:#b45309;border-radius:6px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start;">
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;">
        <h3 style="font-size:15px;font-weight:600;color:#1a2340;margin-bottom:16px;">Iglesias por Zona</h3>
        <div style="display:flex;flex-direction:column;gap:9px;">${bars}</div>
      </div>
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;">
        <h3 style="font-size:15px;font-weight:600;color:#1a2340;margin-bottom:16px;">Distritos con mas iglesias</h3>
        ${topRows}
      </div>
    </div>
  </div>`;
}

/* ---- ZONAS ---- */
function buildZonas() {
  const colors=['#1e3564','#2d5090','#d4a820','#3a6ab0','#e8c040','#4a7ac0','#c9991a'];
  const cards = RAW.zonas.map((z,i) => `
  <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;animation:fadeUp .2s ease;">
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;">
      <div style="width:44px;height:44px;background:${colors[i%colors.length]};border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white;flex-shrink:0;">${z.cod.replace(/\D/g,'')}</div>
      <div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:15px;color:#1a2340;">${escHtml(z.nombre)}</div><div style="font-size:12px;color:#9ca3af;">${z.cod}</div></div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button data-edit-zona="${escHtml(z.cod)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
        <button data-del-zona="${escHtml(z.cod)}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#ef4444;display:flex;align-items:center;">${icons.trash}</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <div data-nav-zona="${escHtml(z.cod)}" style="flex:1;background:#f8f9fc;border-radius:8px;padding:10px;text-align:center;cursor:pointer;" title="Ver distritos">
        <div style="font-size:22px;font-weight:700;color:#1e3564;">${z.distritos||0}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">Distritos</div>
      </div>
      <div data-nav-zona-ig="${escHtml(z.cod)}" style="flex:1;background:#fff8e6;border-radius:8px;padding:10px;text-align:center;cursor:pointer;" title="Ver iglesias">
        <div style="font-size:22px;font-weight:700;color:#d4a820;">${z._igCount||0}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">Iglesias</div>
      </div>
    </div>
  </div>`).join('');
  return cards
    ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;">${cards}</div>`
    : `<div style="padding:60px;text-align:center;color:#9ca3af;">No hay zonas registradas</div>`;
}

/* ---- DISTRITOS ---- */
function buildDistritos() {
  const zonaFilters = `<button data-filter-zona="all" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${S.fZona==='all'?'#1e3564':'#e8eaf2'};background:${S.fZona==='all'?'#1e3564':'white'};color:${S.fZona==='all'?'white':'#6b7280'};font-size:12px;font-weight:500;cursor:pointer;">Todas</button>
    ${RAW.zonas.map(z=>`<button data-filter-zona="${z.cod}" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${S.fZona===z.cod?'#1e3564':'#e8eaf2'};background:${S.fZona===z.cod?'#1e3564':'white'};color:${S.fZona===z.cod?'white':'#6b7280'};font-size:12px;font-weight:500;cursor:pointer;">${escHtml(z.nombre.replace(/ZONA /i,'Zona '))}</button>`).join('')}`;
  const list = getFilteredDistritos();
  const rows = list.map(d => `
  <tr style="border-bottom:1px solid #f0f2f7;" onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background=''">
    <td style="padding:13px 20px;font-weight:500;color:#1a2340;">${escHtml(d.nombre)}</td>
    <td style="padding:13px 20px;color:#9ca3af;font-family:monospace;font-size:12px;">${d.cod}</td>
    <td style="padding:13px 20px;"><span style="background:#eef2ff;color:#1e3564;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;">${escHtml(d.zona)}</span></td>
    <td style="padding:13px 20px;text-align:center;"><span style="background:#fff8e6;color:#d4a820;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;">${d.iglesias||0}</span></td>
    <td style="padding:13px 16px;"><div style="display:flex;gap:6px;justify-content:flex-end;">
      <button data-ver-distrito="${d.cod}" data-ver-zona="${d.codZona}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 10px;font-size:12px;color:#6b7280;cursor:pointer;">Ver iglesias</button>
      <button data-edit-distrito="${escHtml(d.cod)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
      <button data-del-distrito="${escHtml(d.cod)}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#ef4444;display:flex;align-items:center;">${icons.trash}</button>
    </div></td>
  </tr>`).join('');
  return `
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">${zonaFilters}</div>
    <div style="background:white;border-radius:14px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;overflow:hidden;">
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;min-width:640px;">
        <thead><tr style="background:#f8f9fc;">${thCell('Distrito')}${thCell('Codigo')}${thCell('Zona')}${thCell('Iglesias','center')}${thCell('')}</tr></thead>
        <tbody>${rows||emptyRow(5,'No se encontraron distritos')}</tbody>
      </table></div>
    </div>
  </div>`;
}

/* ---- IGLESIAS ---- */
function buildIglesias() {
  const distritoOpts = S.fZona==='all' ? RAW.distritos : RAW.distritos.filter(d=>d.codZona===S.fZona);
  const selectZona = `<select id="sel-zona" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:160px;">
    <option value="all" ${S.fZona==='all'?'selected':''}>Todas las zonas</option>
    ${RAW.zonas.map(z=>`<option value="${z.cod}" ${S.fZona===z.cod?'selected':''}>${escHtml(z.nombre)}</option>`).join('')}</select>`;
  const pastoresList = [...new Set(RAW.iglesias.map(i=>i.pastor||'').filter(Boolean))].sort();
  const selectPastor = `<select id="sel-pastor" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:170px;">
    <option value="all" ${S.fPastor==='all'?'selected':''}>Todos los pastores</option>
    <option value="__sin_pastor__" ${S.fPastor==='__sin_pastor__'?'selected':''}>Sin pastor</option>
    ${pastoresList.map(p=>`<option value="${escHtml(p)}" ${S.fPastor===p?'selected':''}>${escHtml(p)}</option>`).join('')}</select>`;
  const selectDistrito = `<select id="sel-distrito" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:190px;">
    <option value="all" ${S.fDistrito==='all'?'selected':''}>Todos los distritos</option>
    ${distritoOpts.map(d=>`<option value="${d.cod}" ${S.fDistrito===d.cod?'selected':''}>${escHtml(d.nombre)}</option>`).join('')}</select>`;
  const filtered = getFilteredIglesias();
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / S.pageSize));
  const page  = Math.min(S.page, pages);
  const slice = filtered.slice((page-1)*S.pageSize, page*S.pageSize);
  const rows = slice.map(ig => {
    const realIdx = RAW.iglesias.indexOf(ig);
    const driveLink = ig.carpeta_drive ? `<a href="${escHtml(ig.carpeta_drive)}" target="_blank" title="Abrir carpeta Drive" style="color:#1a73e8;display:flex;align-items:center;">${icons.link}</a>` : '';
    const tipoColor = ig.tipo==='grupo'?'#fef3c7':'#dbeafe';
    const tipoTextColor = ig.tipo==='grupo'?'#92400e':'#1e40af';
    return `<tr style="border-bottom:1px solid #f0f2f7;" onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background=''">
      <td style="padding:13px 20px;font-weight:500;color:#1a2340;">${escHtml(ig.nombre)}</td>
      <td style="padding:13px 20px;color:#9ca3af;font-family:monospace;font-size:12px;">${ig.cod}</td>
      <td style="padding:13px 20px;"><span style="background:${tipoColor};color:${tipoTextColor};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;text-transform:capitalize;">${ig.tipo||'iglesia'}</span></td>
      <td style="padding:13px 20px;color:#6b7280;font-size:13px;">${escHtml(ig.distrito||'')}</td>
      <td style="padding:13px 20px;"><span style="background:#eef2ff;color:#1e3564;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;">${escHtml(ig.zona||'')}</span></td>
      <td style="padding:13px 20px;color:#6b7280;font-size:13px;">${escHtml(ig.pastor||'—')}</td>
      <td style="padding:13px 10px;text-align:center;">${driveLink}</td>
      <td style="padding:13px 16px;"><div style="display:flex;gap:6px;justify-content:flex-end;">
        <button data-edit-iglesia="${realIdx}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 10px;font-size:12px;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:4px;">${icons.edit} Editar</button>
        <button data-del-iglesia="${realIdx}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 10px;font-size:12px;color:#ef4444;cursor:pointer;display:flex;align-items:center;gap:4px;">${icons.trash} Eliminar</button>
      </div></td>
    </tr>`;
  }).join('');
  return `
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">${selectZona}${selectDistrito}${selectPastor}<span style="margin-left:auto;font-size:13px;color:#9ca3af;">${total} iglesia${total!==1?'s':''}</span></div>
    <div style="background:white;border-radius:14px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;overflow:hidden;">
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;min-width:820px;">
        <thead><tr style="background:#f8f9fc;">${thSort('Iglesia','nombre')}${thSort('Codigo','cod')}${thSort('Tipo','tipo')}${thSort('Distrito','distrito')}${thSort('Zona','zona')}${thSort('Pastor','pastor')}${thCell('Drive','center')}${thCell('')}</tr></thead>
        <tbody>${rows||emptyRow(7,'No se encontraron iglesias')}</tbody>
      </table></div>
      <div style="padding:14px 20px;border-top:1px solid #f0f2f7;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <span style="font-size:13px;color:#9ca3af;">Pagina ${page} de ${pages}</span>
        <div style="display:flex;gap:6px;">
          <button id="btn-prev" ${page<=1?'disabled':''} style="padding:6px 14px;border-radius:7px;border:1.5px solid #e8eaf2;background:white;color:${page<=1?'#c5cbe0':'#374151'};font-size:13px;cursor:${page<=1?'default':'pointer'};">Anterior</button>
          <button id="btn-next" ${page>=pages?'disabled':''} style="padding:6px 14px;border-radius:7px;border:1.5px solid #e8eaf2;background:white;color:${page>=pages?'#c5cbe0':'#374151'};font-size:13px;cursor:${page>=pages?'default':'pointer'};">Siguiente</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---- PASTORES ---- */
function buildPastores() {
  const igByPastor = {}; RAW.iglesias.forEach(i => { if(i.pastor) igByPastor[i.pastor] = (igByPastor[i.pastor]||0)+1; });
  const list = getFilteredPastores();
  const cards = list.map(p => {
    const parts = p.nombre.split(/[\s,]+/).filter(Boolean);
    const initials = parts.slice(0,2).map(w=>w[0].toUpperCase()).join('');
    return `<div style="background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(30,53,100,.07);border:1px solid #e8eaf2;display:flex;align-items:flex-start;gap:14px;animation:fadeUp .15s ease;">

        ${p.telefono?`<div style="font-size:12px;color:#9ca3af;margin-top:2px;display:flex;align-items:center;gap:4px;">${icons.phone} ${escHtml(p.telefono)}</div>`:''}

  }).join('');
  return list.length
    ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">${cards}</div>`
    : `<div style="padding:60px;text-align:center;color:#9ca3af;font-size:14px;">No se encontraron pastores</div>`;

function buildSolicitudes() {
  const estadoInfo = {
    pendiente_francis:  { label:'Pendiente (Francis)',  bg:'#fef9c3', color:'#854d0e' },
    rechazado_francis:  { label:'Rechazado',            bg:'#fee2e2', color:'#991b1b' },
    pendiente_cesar:    { label:'Pendiente (César)',     bg:'#dbeafe', color:'#1e40af' },
    pendiente_carlos:   { label:'Pendiente (Carlos)',   bg:'#ede9fe', color:'#5b21b6' },
    pendiente_noemi:    { label:'Pendiente (Noemí)',    bg:'#fce7f3', color:'#9d174d' },
    completado:         { label:'Completado',           bg:'#dcfce7', color:'#166534' },
  };
  const items = S._solicitudes || [];
  const loading = S._solicitudesLoading;

  let contenido;
  if (loading) {
    contenido = `<div style="text-align:center;padding:60px;color:#6b7280;">Cargando solicitudes…</div>`;
  } else if (!items.length) {
    contenido = `<div style="text-align:center;padding:60px;">

      <div style="color:#6b7280;font-size:15px;">No hay solicitudes aún.</div>

    </div>`;
  } else {
    contenido = `<div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead><tr style="background:#f8f9fc;">
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Congregación</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Pastor</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Zona</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Código</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Estado</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Fecha</th>
        </tr></thead>
        <tbody>
          ${items.map(s => {
            const est = estadoInfo[s.estado] || { label: s.estado, bg:'#f3f4f6', color:'#374151' };
            const fecha = new Date(s.created_at).toLocaleDateString('es-DO', {day:'2-digit',month:'short',year:'numeric'});
            return `<tr style="border-bottom:1px solid #f0f2f7;">
              <td style="padding:12px 16px;font-weight:600;color:#1e3564;">${escHtml(s.nombre_congregacion)}</td>
              <td style="padding:12px 16px;color:#374151;">${escHtml(s.nombre_pastor)}</td>
              <td style="padding:12px 16px;color:#6b7280;">${escHtml(s.zona||'—')}</td>
              <td style="padding:12px 16px;"><span style="font-family:monospace;background:#f0f2f7;padding:2px 8px;border-radius:4px;">${escHtml(s.codigo_asignado||'—')}</span></td>
              <td style="padding:12px 16px;"><span style="background:${est.bg};color:${est.color};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;">${est.label}</span></td>
              <td style="padding:12px 16px;color:#6b7280;font-size:13px;">${fecha}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-size:18px;font-weight:700;color:#1a2340;margin-bottom:4px;">Solicitudes de Nueva Congregación</h2>
        <p style="font-size:13px;color:#6b7280;">Seguimiento del flujo de aprobación de nuevas congregaciones.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a href="/nueva-congregacion" target="_blank" style="display:flex;align-items:center;gap:6px;background:#1e3564;color:white;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;text-decoration:none;">🔗 Compartir enlace al pastor</a>
        <button id="btn-reload-solicitudes" style="display:flex;align-items:center;gap:6px;background:#f0f2f7;color:#374151;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;">↻ Actualizar</button>
      </div>
    </div>
    <div style="background:white;border-radius:14px;border:1px solid #e8eaf2;overflow:hidden;">
      ${contenido}
    </div>
    <div style="background:#eef2ff;border-radius:12px;padding:16px;font-size:13px;color:#1e3564;">
      <strong>Flujo:</strong> Pastor llena formulario → Francis aprueba → César confirma SunPlus y asigna código → Carlos crea cuenta en Ecclesia → Noemí confirma Infomac y ACMS → Congregación creada como <strong>Grupo</strong> en el sistema.
    </div>
  </div>`;
}

/* ---- HELPERS ---- */
function thSort(label, col) {
  const active = S.sortCol === col;
  const arrow = active ? (S.sortDir==='asc' ? ' &#8593;' : ' &#8595;') : '';
  return `<th data-sort="${col}" style="padding:13px 20px;text-align:left;font-weight:600;font-size:11px;color:${active?'#1e3564':'#6b7280'};text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8eaf2;white-space:nowrap;cursor:pointer;user-select:none;">${label}${arrow}</th>`;
}
function thCell(label, align='left') { return `<th style="padding:13px 20px;text-align:${align};font-weight:600;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8eaf2;white-space:nowrap;">${label}</th>`; }
function emptyRow(cols, msg) { return `<tr><td colspan="${cols}" style="padding:40px;text-align:center;color:#9ca3af;font-size:14px;">${msg}</td></tr>`; }
function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formField(label, id, value, type='text', placeholder='', fontFamily='', required=false) {
  return `<div><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">${label}${required?'<span style="color:#ef4444;margin-left:2px;">*</span>':''}</label><input id="${id}" type="${type}" value="${escHtml(value)}" placeholder="${placeholder}" style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;${fontFamily?'font-family:'+fontFamily+';':''}" /></div>`;
}

/* =====================================================================
   EVENTS
   ===================================================================== */
function bindEvents() {
  q('#btn-sidebar-toggle', el => el.addEventListener('click', () => { S.sidebarOpen=!S.sidebarOpen; render(); }));
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => { S.view=el.dataset.nav; S.search=''; S.fZona='all'; S.fDistrito='all'; S.fPastor='all'; S.page=1; if(el.dataset.nav==='historial')S._historialData=null; render(); }));
  document.querySelectorAll('[data-nav-zona]').forEach(el => el.addEventListener('click', () => { S.view='distritos'; S.fZona=el.dataset.navZona; S.search=''; S.page=1; render(); }));
  document.querySelectorAll('[data-nav-zona-ig]').forEach(el => el.addEventListener('click', () => { S.view='iglesias'; S.fZona=el.dataset.navZonaIg; S.fDistrito='all'; S.search=''; S.page=1; render(); }));
  document.querySelectorAll('[data-filter-zona]').forEach(el => el.addEventListener('click', () => { S.fZona=el.dataset.filterZona; S.page=1; render(); }));
  document.querySelectorAll('[data-ver-distrito]').forEach(el => el.addEventListener('click', () => { S.view='iglesias'; S.fZona=el.dataset.verZona; S.fDistrito=el.dataset.verDistrito; S.search=''; S.page=1; render(); }));
  q('#main-search', el => el.addEventListener('input', e => { S.search=e.target.value; S.page=1; debouncedRender(); }));
  q('#sel-zona', el => el.addEventListener('change', e => { S.fZona=e.target.value; S.fDistrito='all'; S.page=1; render(); }));
  q('#sel-distrito', el => el.addEventListener('change', e => { S.fDistrito=e.target.value; S.page=1; render(); }));
  q('#btn-prev', el => el.addEventListener('click', () => { if(S.page>1){S.page--;render();} }));

   EXCEL IMPORT
   ===================================================================== */
function normalizeKey(k) { return String(k).toLowerCase().replace(/[^a-z0-9]/g,''); }
function findCol(row, ...candidates) {
  const keys = Object.keys(row); for (const c of candidates) { const n=normalizeKey(c); const k=keys.find(k=>normalizeKey(k)===n); if(k!==undefined)return row[k]; } return '';
}
function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type:'array' });
        const preview = {};
        const sheetMap = {};
        for (const name of wb.SheetNames) { sheetMap[name.toLowerCase().trim()] = name; }
        const getSheet = (...names) => { for (const n of names) { const key=n.toLowerCase(); if(sheetMap[key]) return XLSX.utils.sheet_to_json(wb.Sheets[sheetMap[key]], {defval:''}); } return null; };

        // Intentar hojas con nombre estandar primero
        const zonasSheet    = getSheet('zonas','zona');
        const distritosSheet = getSheet('distritos','distrito');
        const iglesiasSheet  = getSheet('iglesias','iglesia','churches');
        const pastoresSheet  = getSheet('pastores','pastor','pastors');

        if (zonasSheet)     preview.zonas    = zonasSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre','name')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (distritosSheet) preview.distritos = distritosSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (iglesiasSheet)  preview.iglesias  = iglesiasSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), pastor: String(findCol(r,'pastor')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim(), codDistrito: String(findCol(r,'codDistrito','cod_distrito','coddistrito')||'').trim().toUpperCase(), distrito: String(findCol(r,'distrito')||'').trim() })).filter(r=>r.cod&&r.nombre);
        if (pastoresSheet)  preview.pastores  = pastoresSheet.map(r=>({ cod: String(findCol(r,'cod','codigo')||'').trim().toUpperCase(), nombre: String(findCol(r,'nombre')||'').trim(), telefono: String(findCol(r,'telefono','tel','phone')||'').trim(), email: String(findCol(r,'email','correo')||'').trim(), codZona: String(findCol(r,'codZona','cod_zona','codzona')||'').trim().toUpperCase(), zona: String(findCol(r,'zona')||'').trim(), codDistrito: String(findCol(r,'codDistrito','cod_distrito','coddistrito')||'').trim().toUpperCase(), distrito: String(findCol(r,'distrito')||'').trim() })).filter(r=>r.cod&&r.nombre);

        // Si no habia hojas estandar, buscar formato plano tipo PADRON (una sola hoja con todo)
        if (!zonasSheet && !distritosSheet && !iglesiasSheet && !pastoresSheet) {
          // Buscar la hoja que tenga columnas de iglesia
          for (const sheetName of wb.SheetNames) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
            if (!rows.length) continue;
            const headers = Object.keys(rows[0]).map(k=>k.toLowerCase());
            const hasCodIglesia = headers.some(h=>h.includes('iglesia')||h.includes('cod_ig'));
            if (!hasCodIglesia) continue;
            // Es formato plano — extraer entidades unicas
            const zonasMap = {}; const distritosMap = {}; const pastoresMap = {};
            const iglesias = [];
            for (const r of rows) {
              const codZona    = String(findCol(r,'COD_ZONA','codZona','cod_zona')||'').trim().toUpperCase();
              const zona       = String(findCol(r,'ZONA','zona')||'').trim();
              const codDist    = String(findCol(r,'COD_DISTRITO','codDistrito','cod_distrito')||'').trim().toUpperCase();
              const distrito   = String(findCol(r,'Distrito','DISTRITO','distrito')||'').trim();
              const codIglesia = String(findCol(r,'COD_IGLESIA','cod_iglesia','codIglesia')||'').trim().toUpperCase();
              const iglesia    = String(findCol(r,'Iglesia','IGLESIA','iglesia','nombre')||'').trim();
              const pastor     = String(findCol(r,'Pastor','PASTOR','pastor')||'').trim();
              if (codZona&&zona&&!zonasMap[codZona])    zonasMap[codZona]    = {cod:codZona,nombre:zona};
              if (codDist&&distrito&&!distritosMap[codDist]) distritosMap[codDist] = {cod:codDist,nombre:distrito,codZona,zona};
              if (pastor&&!pastoresMap[pastor]) {
                // Buscar cod en RAW.pastores por nombre, o generar uno
                const existing = RAW.pastores.find(p=>p.nombre.toLowerCase()===pastor.toLowerCase());
                const cod = existing ? existing.cod : ('P'+String(Object.keys(pastoresMap).length+RAW.pastores.length+1).padStart(3,'0'));
                pastoresMap[pastor] = {cod,nombre:pastor,telefono:'',email:'',codZona,zona,codDistrito:codDist,distrito};
              }
              if (codIglesia&&iglesia) iglesias.push({cod:codIglesia,nombre:iglesia,pastor,codZona,zona,codDistrito:codDist,distrito});
            }
            preview.zonas     = Object.values(zonasMap);
            preview.distritos = Object.values(distritosMap);
            preview.iglesias  = iglesias;
            preview.pastores  = Object.values(pastoresMap);
            break;
          }
        }
        // Anotar cuales son nuevos vs actualizaciones
        if (preview.zonas)     preview.zonas.forEach(r=>{ r._isNew = !RAW.zonas.find(x=>x.cod===r.cod); });
        if (preview.distritos) preview.distritos.forEach(r=>{ r._isNew = !RAW.distritos.find(x=>x.cod===r.cod); });
        if (preview.iglesias)  preview.iglesias.forEach(r=>{ r._isNew = !RAW.iglesias.find(x=>x.cod===r.cod); });
        if (preview.pastores)  preview.pastores.forEach(r=>{ r._isNew = !RAW.pastores.find(x=>x.cod===r.cod); });
        // Si hay nuevos, pedir confirmacion
        const hasNew = (preview.zonas||[]).some(r=>r._isNew)||(preview.distritos||[]).some(r=>r._isNew)||(preview.iglesias||[]).some(r=>r._isNew)||(preview.pastores||[]).some(r=>r._isNew);
        preview._hasNew = hasNew;
        resolve(preview);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function executeImport(preview, mode='all') {
  const filter = rows => mode==='all' ? rows : mode==='new' ? rows.filter(r=>r._isNew) : rows.filter(r=>!r._isNew);
  const clean = rows => rows.map(r => { const {_isNew, ...rest}=r; return rest; });
  S.importing = true; render();
  const sb = S.sbClient; let total = 0; let errorMsg = '';
  try {
    if (preview.zonas?.length) {
      const rows_z = clean(filter(preview.zonas)); if(!rows_z.length) {}
      else { const { error } = await sb.from('zonas').upsert(rows_z, { onConflict: 'cod' });
      if (error) throw error;
      for (const z of rows_z) { const i=RAW.zonas.findIndex(x=>x.cod===z.cod); if(i>=0)RAW.zonas[i]={...RAW.zonas[i],...z}; else RAW.zonas.push(z); }
      total += rows_z.length;
      } }
    if (preview.distritos?.length) {
      const rows_d_all = clean(filter(preview.distritos));
      if (rows_d_all.length) { const rows = rows_d_all.map(d => { if (!d.codZona) { const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===d.zona.toLowerCase()); if(z)d.codZona=z.cod; } return d; });
      const { error } = await sb.from('distritos').upsert(rows, { onConflict: 'cod' });
      if (error) throw error;
      for (const d of rows) { const i=RAW.distritos.findIndex(x=>x.cod===d.cod); if(i>=0)RAW.distritos[i]={...RAW.distritos[i],...d}; else RAW.distritos.push(d); }
      total += rows.length;
      } }
    if (preview.iglesias?.length) {
      const rows_i_all = clean(filter(preview.iglesias));
      if (rows_i_all.length) { const rows = rows_i_all.map(ig => { if(!ig.codZona&&ig.zona){const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===ig.zona.toLowerCase());if(z)ig.codZona=z.cod;} if(!ig.codDistrito&&ig.distrito){const d=RAW.distritos.find(d=>d.nombre.toLowerCase()===ig.distrito.toLowerCase());if(d)ig.codDistrito=d.cod;} return ig; });
      const chunks = []; for(let i=0;i<rows.length;i+=200)chunks.push(rows.slice(i,i+200));
      for (const chunk of chunks) { const{error}=await sb.from(S.sbTable).upsert(chunk,{onConflict:'cod'}); if(error)throw error; }
      for (const ig of rows) { const i=RAW.iglesias.findIndex(x=>x.cod===ig.cod); if(i>=0)RAW.iglesias[i]={...RAW.iglesias[i],...ig}; else RAW.iglesias.push(ig); }
      total += rows.length;
      } }
    if (preview.pastores?.length) {
      const rows_p_all = clean(filter(preview.pastores));
      if (rows_p_all.length) { const rows = rows_p_all.map(p => { if(!p.codZona&&p.zona){const z=RAW.zonas.find(z=>z.nombre.toLowerCase()===p.zona.toLowerCase());if(z)p.codZona=z.cod;} if(!p.codDistrito&&p.distrito){const d=RAW.distritos.find(d=>d.nombre.toLowerCase()===p.distrito.toLowerCase());if(d)p.codDistrito=d.cod;} return p; });
      const { error } = await sb.from('pastores').upsert(rows, { onConflict: 'cod' });
      if (error) throw error;
      for (const p of rows) { const i=RAW.pastores.findIndex(x=>x.cod===p.cod); if(i>=0)RAW.pastores[i]={...RAW.pastores[i],...p}; else RAW.pastores.push(p); }
      total += rows.length;
      } }
    recomputeCounts();
    S.importResult = { error: false, msg: `Se importaron o actualizaron ${total} registros exitosamente.` };
  } catch(e) {
    S.importResult = { error: true, msg: e.message || String(e) };
  }
  S.importing = false; render();
}

function registrarHistorial(accion, entidad, cod, nombre) {
  const entry = { ts: new Date().toISOString(), accion, entidad, cod: cod||'', nombre: nombre||'' };
  // Supabase (fire-and-forget)
  if (S.sbClient) S.sbClient.from('historial').insert([entry]).then(()=>{}).catch(()=>{});
  // localStorage fallback
  try {
    const h = JSON.parse(localStorage.getItem('padron_historial')||'[]');
    h.unshift(entry); if(h.length>300) h.splice(300);
    localStorage.setItem('padron_historial', JSON.stringify(h));
  } catch(e) {}
}
function getHistorial() {

        S.sbClient.from('configuracion').select('valor').eq('id','flujo_congregacion').maybeSingle(),
      ]);
      if(!zR.error&&zR.data?.length)RAW.zonas=zR.data;
      if(!dR.error&&dR.data?.length)RAW.distritos=dR.data;
      if(!iR.error&&iR.data?.length)RAW.iglesias=iR.data;
      if(!pR.error&&pR.data?.length)RAW.pastores=pR.data;
      if(!cfgR.error&&cfgR.data?.valor)S.camposCustom=cfgR.data.valor||[];
      if(!flujoR.error&&flujoR.data?.valor)S._flujoCfg=flujoR.data.valor;
      recomputeCounts();
    }catch(e){console.warn('Error cargando datos',e);S.loadError='No se pudieron cargar los datos. Verifica la conexión a Supabase.';}
  }else{
    try{const res=await fetch('./data/iglesias.json');RAW=await res.json();recomputeCounts();}
    catch(e){console.warn('Sin datos locales',e);}
  }
  S.loaded=true;
  document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();S.showSearch=true;S.searchQuery='';render();setTimeout(()=>document.getElementById('search-input')?.focus(),50);} if(e.key==='Escape'&&S.showSearch){S.showSearch=false;render();} });
  window.addEventListener('resize',()=>{const open=window.innerWidth>=768;if(open!==S.sidebarOpen){S.sidebarOpen=open;render();}});
  render();
}
init();
</script>
</body>
</html>
