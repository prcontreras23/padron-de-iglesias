/* =====================================================================
   AUTO-CODIGO
   ===================================================================== */
function nextZonaCod() {
  const nums = RAW.zonas.map(z => parseInt(z.cod.replace(/\D/g,''))||0);
  return 'Z' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(2,'0');
}
function nextDistritoCod() {
  const nums = RAW.distritos.map(d => parseInt(d.cod.replace(/\D/g,''))||0);
  return 'DT' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3,'0');
}
function nextPastorCod() {
  const nums = RAW.pastores.map(p => parseInt(p.cod.replace(/\D/g,''))||0);
  return 'P' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3,'0');
}

/* =====================================================================
   FILTER HELPERS
   ===================================================================== */
function getFilteredIglesias() {
  let list = RAW.iglesias;
  if (S.fZona !== 'all') list = list.filter(i => i.codZona === S.fZona);
  if (S.fDistrito !== 'all') list = list.filter(i => i.codDistrito === S.fDistrito);
  if (S.fPastor !== 'all') list = list.filter(i => (S.fPastor === '__sin_pastor__' ? (!i.pastor||!i.pastor.trim()) : (i.pastor||'') === S.fPastor));
  if (S.fTipoIg && S.fTipoIg !== 'all') list = list.filter(i => (i.tipo||'iglesia') === S.fTipoIg);
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(i =>
      i.nombre.toLowerCase().includes(q) ||
      i.cod.toLowerCase().includes(q) ||
      (i.pastor||'').toLowerCase().includes(q) ||
      (i.distrito||'').toLowerCase().includes(q)
    );
  }
  // Ordenar
  list = [...list].sort((a,b) => {
    const av = (a[S.sortCol]||'').toLowerCase();
    const bv = (b[S.sortCol]||'').toLowerCase();
    return S.sortDir==='asc' ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
  });
  return list;
}
function getFilteredDistritos() {
  let list = RAW.distritos;
  if (S.fZona !== 'all') list = list.filter(d => d.codZona === S.fZona);
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(d => d.nombre.toLowerCase().includes(q) || d.cod.toLowerCase().includes(q));
  }
  return list;
}
function getFilteredPastores() {
  let list = RAW.pastores;
  if (S.search.trim()) {
    const q = S.search.toLowerCase();
    list = list.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.distrito||'').toLowerCase().includes(q) ||
      (p.email||'').toLowerCase().includes(q)
    );
  }
  if (S.fEstado && S.fEstado !== 'all') list = list.filter(p => (p.estado||'ordenado') === S.fEstado);
  if (S.fRol    && S.fRol    !== 'all') list = list.filter(p => (p.rol||'pastor') === S.fRol);
  return [...list].sort((a,b) => a.nombre.localeCompare(b.nombre));
}

/* =====================================================================
   DEBOUNCE
   ===================================================================== */
function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
const debouncedRender = debounce(render, 160);

// render() replaces the whole #app tree, which would steal focus/cursor from
// whatever input the user is actively typing in. Save and restore it around
// the render so live-filter inputs (like #main-search) don't feel broken.
function renderPreservingFocus() {
  const active = document.activeElement;
  const id = active && active.id;
  const start = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const end = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  render();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (start !== null && el.setSelectionRange) { try { el.setSelectionRange(start, end); } catch(e) {} }
    }
  }
}
const debouncedRenderPreservingFocus = debounce(renderPreservingFocus, 160);

function bindLoginEvents() {
  // Volver al login
  document.getElementById('btn-back-login')?.addEventListener('click', () => {
    S.loginForgotMode=false; S.loginResetSent=false; S.loginError=''; render();
    setTimeout(()=>document.getElementById('login-email')?.focus(),50);
  });

  // Olvidé contraseña
  document.getElementById('btn-forgot')?.addEventListener('click', () => {
    S.loginEmail = document.getElementById('login-email')?.value?.trim()||'';
    S.loginForgotMode=true; S.loginError=''; render();
    setTimeout(()=>document.getElementById('reset-email')?.focus(),50);
  });

  // Enviar enlace de reset
  document.getElementById('btn-send-reset')?.addEventListener('click', async () => {
    const email = document.getElementById('reset-email')?.value?.trim()||'';
    if(!email){ S.loginError='Ingresa tu correo.'; render(); return; }
    S.loginLoading=true; S.loginError=''; render();
    const redirectTo = window.location.origin + window.location.pathname;
    const { error } = await S.sbClient.auth.resetPasswordForEmail(email, { redirectTo });
    S.loginLoading=false;
    if(error){ S.loginError=error.message; render(); return; }
    S.loginEmail=email; S.loginResetSent=true; S.loginForgotMode=false; render();
  });

  // Nueva contraseña (después de clic en enlace de reset)
  document.getElementById('btn-set-password')?.addEventListener('click', async () => {
    const pass = document.getElementById('new-password')?.value||'';
    if(!pass||pass.length<6){ S.loginError='La contraseña debe tener al menos 6 caracteres.'; render(); return; }
    S.loginLoading=true; S.loginError=''; render();
    const { error } = await S.sbClient.auth.updateUser({ password: pass });
    S.loginLoading=false;
    if(error){ S.loginError=error.message; render(); return; }
    // Limpiar flag de cambio obligatorio
    if(S.currentUser?.id) await S.sbClient.from('profiles').update({debe_cambiar_password:false}).eq('id',S.currentUser.id);
    // Sesión ya activa, cargar app
    const { data: { session } } = await S.sbClient.auth.getSession();
    if(session?.user){
      S.currentUser=session.user; S.loginResetMode=false;
      await loadProfile(session.user.id);
      await loadAppData();
    }
    render();
  });

  const doLogin = async () => {
    const email = document.getElementById('login-email')?.value?.trim()||'';
    const pass  = document.getElementById('login-password')?.value||'';
    if (!email||!pass) { S.loginError='Ingresa correo y contraseña.'; render(); return; }
    S.loginLoading=true; S.loginError=''; render();
    try {
      const { data, error } = await S.sbClient.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      S.currentUser = data.user;
      S.loginLoading = false;
      await loadProfile(data.user.id);
      if(S.currentProfile?.debe_cambiar_password){S.loginResetMode=true;S.authLoading=false;render();return;}
      await loadAppData();
      render();
    } catch(e) {
      S.loginLoading=false;
      S.loginError = e.message==='Invalid login credentials' ? 'Correo o contraseña incorrectos.' : (e.message||'Error al iniciar sesión.');
      render();
    }
  };
  document.getElementById('btn-login')?.addEventListener('click', doLogin);
  document.getElementById('login-password')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('login-email')?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-password')?.focus(); });
}

async function loadProfile(userId) {
  try {
    const { data } = await S.sbClient.from('profiles').select('*').eq('id', userId).maybeSingle();
    S.currentProfile = data;
  } catch(e) { console.warn('Error cargando perfil', e); }
}

async function loadAllProfiles() {
  S._allProfilesLoading = true;
  try {
    const { data } = await S.sbClient.from('profiles').select('*').order('nombre');
    S._allProfiles = data || [];
  } catch(e) { S._allProfiles = []; }
  S._allProfilesLoading = false;
  render();
}

function renderKeepScroll() {
  const sy = (document.getElementById('main-content') || document.getElementById('app'))?.scrollTop ?? window.scrollY;
  render();
  const newMain = document.getElementById('main-content');
  if (newMain) newMain.scrollTop = sy; else window.scrollTo(0, sy);
}
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  if (S.authLoading) {
    app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f0f2f7;"><span style="animation:spin .8s linear infinite;display:inline-block;color:#2563eb;">${icons.spin}</span></div>`;
    return;
  }
  if (!S.currentUser) {
    app.innerHTML = buildLoginScreen();
    bindLoginEvents();
    setTimeout(() => document.getElementById('login-email')?.focus(), 50);
    return;
  }
  app.innerHTML = buildHTML();
  bindEvents();
}

  const perm = PERM_MAP[S.view];
  if (perm && !canDo(perm)) return NO_ACCESO;
  switch(S.view) {
    case 'dashboard':     return buildDashboard();
    case 'zonas':         return buildZonas();
    case 'distritos':     return buildDistritos();
    case 'iglesias':      return buildIglesias();
    case 'pastores':      return buildPastores();
    case 'historial':     return buildHistorialView();
    case 'solicitudes':   return buildSolicitudes();

    case 'vacaciones':    return buildVacaciones();
    case 'calendario':    return buildCalendarioAusencias();
    case 'organizacion':  return buildOrganizacion();
    case 'notas':         return buildNotas();
    case 'configuracion': return buildConfiguracion();
    default:              return buildDashboard();
  }
}

/* ---- DASHBOARD ---- */
function buildDashboard() {
  const stat = (num, label, bg, color, iconHtml, nav='') => `
  <div data-nav-dash="${nav}" style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(16,24,40,.06);display:flex;align-items:center;gap:16px;border:1px solid #e8eaf2;${nav?'cursor:pointer;':''}transition:box-shadow .15s;" onmouseover="${nav?"this.style.boxShadow='0 4px 12px rgba(16,24,40,.12)'":''}" onmouseout="${nav?"this.style.boxShadow='0 1px 4px rgba(16,24,40,.06)'":""}">
    <div style="width:52px;height:52px;background:${bg};border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${iconHtml.replace('currentColor',color)}</div>
    <div style="flex:1;"><div style="font-size:32px;font-weight:700;color:#1e3564;line-height:1;">${num}</div><div style="font-size:13px;color:#6b7280;margin-top:2px;">${label}</div></div>
    ${nav?`<span style="font-size:18px;color:#c5cbe0;">›</span>`:''}
  </div>`;

  // Estadísticas de iglesias vs grupos y pastores ordenados vs licenciados
  const igActivas = RAW.iglesias.filter(i=>i.tipo!=='pendiente_revision'&&i.pastor&&i.pastor.trim());
  const iglesias = igActivas.filter(i=>i.tipo==='iglesia'||!i.tipo).length;
  const grupos = igActivas.filter(i=>i.tipo==='grupo').length;
  const pastoresCampo = RAW.pastores.filter(p=>!p.rol||p.rol==='pastor'||p.rol==='asociado'||p.rol==='plantador');
  const ordenados = pastoresCampo.filter(p=>p.estado==='ordenado'||!p.estado).length;
  const licenciados = pastoresCampo.filter(p=>p.estado==='licenciado').length;

  const maxIg = Math.max(...RAW.zonas.map(z => z._igCount||0), 1);
  const colors = ['#1e3564','#2d5090','#d4a820','#3a6ab0','#e8c040','#4a7ac0','#f0d060'];
  const bars = RAW.zonas.map((z,i) => {
    const cnt = z._igCount||0; const pct = Math.max((cnt/maxIg)*100,4);
    return `<div data-nav-zona-ig="${z.cod}" style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <div style="width:56px;font-size:12px;color:#6b7280;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${z.nombre.replace(/ZONA /i,'Z')}</div>
      <div style="flex:1;height:26px;background:#f0f2f7;border-radius:6px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${colors[i%colors.length]};border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:white;min-width:28px;">${cnt}</div></div>
    </div>`;
  }).join('');
  const topD = [...RAW.distritos].sort((a,b)=>b.iglesias-a.iglesias).slice(0,8);
  const topRows = topD.map((d,i) => `
  <div data-nav-dash="iglesias|distrito=${d.cod}" style="display:flex;align-items:center;gap:12px;padding:10px 0;${i<topD.length-1?'border-bottom:1px solid #f0f2f7;':''}cursor:pointer;" onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background=''">
    <div style="width:24px;height:24px;border-radius:50%;background:${i<3?'#d4a820':'#e8eaf2'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${i<3?'white':'#9ca3af'};flex-shrink:0;">${i+1}</div>
    <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:500;color:#1a2340;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(d.nombre)}</div><div style="font-size:12px;color:#9ca3af;">${escHtml(d.zona)}</div></div>
    <span style="background:#fff8e6;color:#d4a820;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;">${d.iglesias||0}</span>
  </div>`).join('');
  const igSinPastor = RAW.iglesias.filter(i=>i.tipo!=='pendiente_revision'&&(!i.pastor||!i.pastor.trim()));
  const sinPastor = igSinPastor.length;
  const igPendientes = RAW.iglesias.filter(i=>i.tipo==='pendiente_revision');
  const sinRevision = igPendientes.length;
  const pastSinDistrito = RAW.pastores.filter(p=>!p.codDistrito&&p.rol!=='departamental'&&p.rol!=='administrador'&&p.rol!=='oficina'&&p.rol!=='asociado'&&p.rol!=='plantador');
  const sinDistrito = pastSinDistrito.length;
  const distsSinIg = RAW.distritos.filter(d=>!d.iglesias||d.iglesias===0);
  const distSinIg = distsSinIg.length;

  function buildAlertCard(icon, title, color, bg, action, names) {
    const MAX = 6;
    const shown = names.slice(0, MAX);
    const extra = names.length - MAX;
    const nameList = shown.length
      ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">${shown.map(n=>`<span style="background:rgba(0,0,0,.08);border-radius:20px;padding:1px 8px;font-size:11px;color:${color};">${escHtml(n)}</span>`).join('')}${extra>0?`<span style="font-size:11px;color:${color};padding:1px 6px;">+${extra} más</span>`:''}</div>`
      : '';
    return `<div data-alerta="${action}" style="padding:12px 16px;background:${bg};border-radius:10px;cursor:pointer;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="width:20px;height:20px;border-radius:50%;background:${color};color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon}</span>
        <span style="font-size:13px;font-weight:600;color:${color};flex:1;">${title}</span>
        <span style="font-size:12px;color:${color};">Ver &rsaquo;</span>
      </div>
      ${nameList}
    </div>`;
  }

  const alertItems = [];
  if (sinRevision>0) alertItems.push(buildAlertCard('⚠',sinRevision+' iglesia'+(sinRevision!==1?'s':'')+' pendiente'+(sinRevision!==1?'s':'')+' de revisión','#991b1b','#fee2e2','iglesias',igPendientes.map(i=>i.nombre)));
  if (sinPastor>0) alertItems.push(buildAlertCard('!',sinPastor+' iglesia'+(sinPastor!==1?'s':'')+' sin pastor asignado','#854d0e','#fef9c3','iglesias-sin-pastor',igSinPastor.map(i=>i.nombre)));
  if (sinDistrito>0) alertItems.push(buildAlertCard('!',sinDistrito+' pastor'+(sinDistrito!==1?'es':'')+' sin distrito asignado','#9a3412','#ffedd5','pastores',pastSinDistrito.map(p=>p.nombre)));
  if (distSinIg>0) alertItems.push(buildAlertCard('i',distSinIg+' distrito'+(distSinIg!==1?'s':'')+' sin iglesias registradas','#1e40af','#dbeafe','distritos',distsSinIg.map(d=>d.nombre)));
  const asociados  = pastoresCampo.filter(p=>p.rol==='asociado'||p.rol==='plantador').length;
  const oficina    = RAW.pastores.filter(p=>p.rol==='departamental'||p.rol==='administrador'||p.rol==='oficina').length;
  const totalPastoresCampo = pastoresCampo.length;

  function secTitle(t) { return `<div style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;">${t}</div>`; }
  function miniBar(label,val,total,color,nav='') {
    const pct = total>0?Math.max((val/total)*100,0):0;
    return `<div data-nav-dash="${nav}" style="display:flex;align-items:center;gap:10px;${nav?'cursor:pointer;border-radius:6px;padding:3px 4px;':'padding:3px 4px;'}transition:background .12s;" onmouseover="${nav?"this.style.background='#f0f2f7'":''}" onmouseout="${nav?"this.style.background=''":""}">
      <span style="font-size:12px;color:#6b7280;width:80px;flex-shrink:0;">${label}</span>
      <div style="flex:1;height:10px;background:#f0f2f7;border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${color};border-radius:5px;"></div></div>
      <span style="font-size:13px;font-weight:600;color:#1a2340;width:28px;text-align:right;">${val}</span>
    </div>`;
  }

  const alertSection = alertItems.length
    ? `<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1.5px solid #fca5a5;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
          <span style="font-size:14px;font-weight:700;color:#1a2340;">Alertas (${alertItems.length})</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">${alertItems.join('')}</div>
      </div>` : '';

  return `
  <div style="display:flex;flex-direction:column;gap:22px;">

    ${alertSection}

    <!-- RESUMEN GENERAL -->
    <div>
      ${secTitle('Resumen general')}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">
        ${stat(RAW.zonas.length,'Zonas','#eef2ff','#1e3564',icons.globe,'zonas')}
        ${stat(RAW.distritos.length,'Distritos','#fff8e6','#d4a820',icons.users,'distritos')}
        ${stat(iglesias,'Iglesias','#dbeafe','#1e40af',icons.home,'iglesias')}
        ${stat(grupos,'Grupos','#fef3c7','#92400e',icons.users,'iglesias|tipo=grupo')}
      </div>
    </div>

    <!-- PERSONAL MINISTERIAL -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">
      <div>
        ${secTitle('Pastores de campo')}
        <div style="background:white;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;">
          <div data-nav-dash="pastores" style="display:flex;align-items:baseline;gap:6px;margin-bottom:16px;cursor:pointer;" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
            <span style="font-size:36px;font-weight:800;color:#1e3564;line-height:1;">${totalPastoresCampo}</span>
            <span style="font-size:13px;color:#9ca3af;">en total ›</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${miniBar('Ordenados', ordenados, totalPastoresCampo, '#166534', 'pastores|estado=ordenado')}
            ${miniBar('Licenciados', licenciados, totalPastoresCampo, '#b45309', 'pastores|estado=licenciado')}
            ${miniBar('Asociados', asociados, totalPastoresCampo, '#0369a1', 'pastores|rol=asociado')}
          </div>
        </div>
      </div>
      <div>
        ${secTitle('Personal de oficina')}
        <div style="background:white;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;">
          <div data-nav-dash="pastores|rol=departamental" style="display:flex;align-items:baseline;gap:6px;margin-bottom:16px;cursor:pointer;" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
            <span style="font-size:36px;font-weight:800;color:#5b21b6;line-height:1;">${oficina}</span>
            <span style="font-size:13px;color:#9ca3af;">en total ›</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${miniBar('Departamental', RAW.pastores.filter(p=>p.rol==='departamental').length, oficina||1, '#7c3aed', 'pastores|rol=departamental')}
            ${miniBar('Administrador', RAW.pastores.filter(p=>p.rol==='administrador').length, oficina||1, '#a855f7', 'pastores|rol=administrador')}
            ${miniBar('Oficina', RAW.pastores.filter(p=>p.rol==='oficina').length, oficina||1, '#c026d3', 'pastores|rol=oficina')}
          </div>
        </div>
      </div>
    </div>

    <!-- DISTRIBUCIÓN GEOGRÁFICA -->
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start;">
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;">
        <h3 style="font-size:14px;font-weight:600;color:#1a2340;margin-bottom:14px;">Iglesias por zona</h3>
        <div style="display:flex;flex-direction:column;gap:9px;">${bars}</div>
      </div>
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;">
        <h3 style="font-size:14px;font-weight:600;color:#1a2340;margin-bottom:14px;">Distritos con más iglesias</h3>
        ${topRows}
      </div>
    </div>

  </div>`;
}

/* ---- ZONAS ---- */
function buildZonas() {
  const colors=['#1e3564','#2d5090','#d4a820','#3a6ab0','#e8c040','#4a7ac0','#c9991a'];
  const cards = RAW.zonas.map((z,i) => `
  <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;animation:fadeUp .2s ease;">
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;">
      <div style="width:44px;height:44px;background:${colors[i%colors.length]};border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white;flex-shrink:0;">${z.cod.replace(/\D/g,'')}</div>
      <div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:15px;color:#1a2340;">${escHtml(z.nombre)}</div><div style="font-size:12px;color:#9ca3af;">${z.cod}</div></div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button data-edit-zona="${escHtml(z.cod)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
        <button data-del-zona="${escHtml(z.cod)}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#ef4444;display:flex;align-items:center;">${icons.trash}</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <div data-nav-zona="${escHtml(z.cod)}" style="flex:1;background:#f8f9fc;border-radius:8px;padding:10px;text-align:center;cursor:pointer;" title="Ver distritos">
        <div style="font-size:22px;font-weight:700;color:#1e3564;">${z.distritos||0}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">Distritos</div>
      </div>
      <div data-nav-zona-ig="${escHtml(z.cod)}" style="flex:1;background:#fff8e6;border-radius:8px;padding:10px;text-align:center;cursor:pointer;" title="Ver iglesias">
        <div style="font-size:22px;font-weight:700;color:#d4a820;">${z._igCount||0}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">Iglesias</div>
      </div>
    </div>
  </div>`).join('');
  return cards
    ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;">${cards}</div>`
    : `<div style="padding:60px;text-align:center;color:#9ca3af;">No hay zonas registradas</div>`;
}

/* ---- DISTRITOS ---- */
function buildDistritos() {
  const zonaFilters = `<button data-filter-zona="all" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${S.fZona==='all'?'#2563eb':'#e8eaf2'};background:${S.fZona==='all'?'#2563eb':'white'};color:${S.fZona==='all'?'white':'#6b7280'};font-size:12px;font-weight:500;cursor:pointer;">Todas</button>
    ${RAW.zonas.map(z=>`<button data-filter-zona="${z.cod}" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${S.fZona===z.cod?'#2563eb':'#e8eaf2'};background:${S.fZona===z.cod?'#2563eb':'white'};color:${S.fZona===z.cod?'white':'#6b7280'};font-size:12px;font-weight:500;cursor:pointer;">${escHtml(z.nombre.replace(/ZONA /i,'Zona '))}</button>`).join('')}`;
  const list = getFilteredDistritos();
  const rows = list.map(d => `
  <tr style="border-bottom:1px solid #f0f2f7;" onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background=''">
    <td style="padding:13px 20px;font-weight:500;color:#1a2340;">${escHtml(d.nombre)}</td>
    <td style="padding:13px 20px;color:#9ca3af;font-family:monospace;font-size:12px;">${d.cod}</td>
    <td style="padding:13px 20px;"><span style="background:#eff4ff;color:#2563eb;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;">${escHtml(d.zona)}</span></td>
    <td style="padding:13px 20px;text-align:center;"><span style="background:#fff8e6;color:#d4a820;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;">${d.iglesias||0}</span></td>
    <td style="padding:13px 16px;"><div style="display:flex;gap:6px;justify-content:flex-end;">
      <button data-ver-distrito="${d.cod}" data-ver-zona="${d.codZona}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 10px;font-size:12px;color:#6b7280;cursor:pointer;">Ver iglesias</button>
      <button data-edit-distrito="${escHtml(d.cod)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
      <button data-del-distrito="${escHtml(d.cod)}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#ef4444;display:flex;align-items:center;">${icons.trash}</button>
    </div></td>
  </tr>`).join('');
  return `
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">${zonaFilters}</div>
    <div style="background:white;border-radius:14px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;overflow:hidden;">
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;min-width:640px;">
        <thead><tr style="background:#f8f9fc;">${thCell('Distrito')}${thCell('Codigo')}${thCell('Zona')}${thCell('Iglesias','center')}${thCell('')}</tr></thead>
        <tbody>${rows||emptyRow(5,'No se encontraron distritos')}</tbody>
      </table></div>
    </div>
  </div>`;
}

/* ---- IGLESIAS ---- */
function buildIglesias() {
  const distritoOpts = S.fZona==='all' ? RAW.distritos : RAW.distritos.filter(d=>d.codZona===S.fZona);
  const selectZona = `<select id="sel-zona" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:160px;">
    <option value="all" ${S.fZona==='all'?'selected':''}>Todas las zonas</option>
    ${RAW.zonas.map(z=>`<option value="${z.cod}" ${S.fZona===z.cod?'selected':''}>${escHtml(z.nombre)}</option>`).join('')}</select>`;
  const pastoresList = [...new Set(RAW.iglesias.map(i=>i.pastor||'').filter(Boolean))].sort();
  const selectPastor = `<select id="sel-pastor" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:170px;">
    <option value="all" ${S.fPastor==='all'?'selected':''}>Todos los pastores</option>
    <option value="__sin_pastor__" ${S.fPastor==='__sin_pastor__'?'selected':''}>Sin pastor</option>
    ${pastoresList.map(p=>`<option value="${escHtml(p)}" ${S.fPastor===p?'selected':''}>${escHtml(p)}</option>`).join('')}</select>`;
  const selectDistrito = `<select id="sel-distrito" style="padding:8px 12px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:13px;color:#374151;background:white;outline:none;cursor:pointer;min-width:190px;">
    <option value="all" ${S.fDistrito==='all'?'selected':''}>Todos los distritos</option>
    ${distritoOpts.map(d=>`<option value="${d.cod}" ${S.fDistrito===d.cod?'selected':''}>${escHtml(d.nombre)}</option>`).join('')}</select>`;
  const filtered = getFilteredIglesias();
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / S.pageSize));
  const page  = Math.min(S.page, pages);
  const slice = filtered.slice((page-1)*S.pageSize, page*S.pageSize);
  const selIg = S.selectedIglesias;
  const allIgChecked = slice.length > 0 && slice.every(ig => selIg.has(ig.cod));
  const selIgCount = filtered.filter(ig => selIg.has(ig.cod)).length;
  const bulkIgBar = selIgCount > 0 ? `
    <div style="background:#2563eb;color:white;border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:600;">${selIgCount} iglesia${selIgCount!==1?'s':''} seleccionada${selIgCount!==1?'s':''}</span>
      <span style="flex:1;"></span>
      <span style="font-size:12px;opacity:.7;">Cambiar tipo a:</span>
      <button id="btn-bulk-ig-iglesia" style="background:#1e40af;color:white;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">Iglesia</button>
      <button id="btn-bulk-ig-grupo" style="background:#92400e;color:white;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">Grupo</button>
      <button id="btn-bulk-ig-clear" style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;">✕ Cancelar</button>
    </div>` : '';

  const rows = slice.map(ig => {
    const realIdx = RAW.iglesias.indexOf(ig);
    const driveLink = ig.carpeta_drive ? `<a href="${escHtml(ig.carpeta_drive)}" target="_blank" title="Abrir carpeta Drive" style="color:#1a73e8;display:flex;align-items:center;">${icons.link}</a>` : '';
    const tipoColor = ig.tipo==='grupo'?'#fef3c7':ig.tipo==='pendiente_revision'?'#fee2e2':'#dbeafe';
    const tipoTextColor = ig.tipo==='grupo'?'#92400e':ig.tipo==='pendiente_revision'?'#991b1b':'#1e40af';
    const tipoLabel = ig.tipo==='pendiente_revision'?'⚠ Revisar':ig.tipo||'iglesia';
    const igChecked = selIg.has(ig.cod);
return `<tr style="border-bottom:1px solid #f0f2f7;background:${igChecked?'#eef2ff':''}" onmouseover="this.style.background='${igChecked?'#e0e7ff':'#f8f9fc'}'" onmouseout="this.style.background='${igChecked?'#eef2ff':''}'">
      <td style="padding:8px 8px 8px 16px;"><input type="checkbox" data-chk-iglesia="${escHtml(ig.cod)}" ${igChecked?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:#2563eb;" /></td>
      <td style="padding:13px 20px;font-weight:500;color:#1a2340;">${escHtml(ig.nombre)}</td>
      <td style="padding:13px 20px;color:#9ca3af;font-family:monospace;font-size:12px;">${ig.cod}</td>
      <td style="padding:13px 20px;"><span style="background:${tipoColor};color:${tipoTextColor};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;text-transform:capitalize;">${tipoLabel}</span></td>
      <td style="padding:13px 20px;color:#6b7280;font-size:13px;">${escHtml(ig.distrito||'')}</td>
      <td style="padding:13px 20px;"><span style="background:#eff4ff;color:#2563eb;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;">${escHtml(ig.zona||'')}</span></td>
      <td style="padding:13px 20px;color:#6b7280;font-size:13px;">${escHtml(ig.pastor||'—')}</td>
      <td style="padding:13px 10px;text-align:center;">${driveLink}</td>
      <td style="padding:13px 16px;"><div style="display:flex;gap:6px;justify-content:flex-end;">
        <button data-edit-iglesia="${realIdx}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 10px;font-size:12px;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:4px;">${icons.edit} Editar</button>
        <button data-del-iglesia="${realIdx}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 10px;font-size:12px;color:#ef4444;cursor:pointer;display:flex;align-items:center;gap:4px;">${icons.trash} Eliminar</button>
      </div></td>
    </tr>`;
  }).join('');
  return `
  <div style="display:flex;flex-direction:column;gap:16px;">
    ${bulkIgBar}
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">${selectZona}${selectDistrito}${selectPastor}<span style="margin-left:auto;font-size:13px;color:#9ca3af;">${total} iglesia${total!==1?'s':''}</span></div>
    <div style="background:white;border-radius:14px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;overflow:hidden;">
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;min-width:860px;">
        <thead><tr style="background:#f8f9fc;"><th style="padding:8px 8px 8px 16px;"><input id="chk-ig-all" type="checkbox" ${allIgChecked?'checked':''} style="accent-color:#2563eb;width:15px;height:15px;cursor:pointer;" title="Seleccionar todos" /></th>${thSort('Iglesia','nombre')}${thSort('Codigo','cod')}${thSort('Tipo','tipo')}${thSort('Distrito','distrito')}${thSort('Zona','zona')}${thSort('Pastor','pastor')}${thCell('Drive','center')}${thCell('')}</tr></thead>
        <tbody>${rows||emptyRow(8,'No se encontraron iglesias')}</tbody>
      </table></div>
      <div style="padding:14px 20px;border-top:1px solid #f0f2f7;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <span style="font-size:13px;color:#9ca3af;">Pagina ${page} de ${pages}</span>
        <div style="display:flex;gap:6px;">
          <button id="btn-prev" ${page<=1?'disabled':''} style="padding:6px 14px;border-radius:7px;border:1.5px solid #e8eaf2;background:white;color:${page<=1?'#c5cbe0':'#374151'};font-size:13px;cursor:${page<=1?'default':'pointer'};">Anterior</button>
          <button id="btn-next" ${page>=pages?'disabled':''} style="padding:6px 14px;border-radius:7px;border:1.5px solid #e8eaf2;background:white;color:${page>=pages?'#c5cbe0':'#374151'};font-size:13px;cursor:${page>=pages?'default':'pointer'};">Siguiente</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---- PASTORES ---- */
function esPastorCampo(p) { return !p.rol||p.rol==='pastor'||p.rol==='asociado'||p.rol==='plantador'; }
function esPersonalOficina(p) { return p.rol==='departamental'||p.rol==='administrador'||p.rol==='oficina'; }

function buildPastores() {
  const igByPastor = {}; RAW.iglesias.forEach(i => { if(i.pastor) igByPastor[i.pastor] = (igByPastor[i.pastor]||0)+1; });
  const list = getFilteredPastores();
  const sel = S.selectedPastores;
  const tab = S.personalTab === 'oficina' ? 'oficina' : 'pastores';

  const campo    = list.filter(esPastorCampo);
  const oficina  = list.filter(esPersonalOficina);
  const activeList = tab === 'oficina' ? oficina : campo;

  const allChecked = activeList.length > 0 && activeList.every(p => sel.has(p.cod));
  const selCount = activeList.filter(p => sel.has(p.cod)).length;

  const tabBar = `
    <div style="display:flex;gap:4px;background:#eef0f5;border-radius:10px;padding:4px;width:fit-content;">
      <button data-personal-tab="pastores" style="padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:${tab==='pastores'?'white':'transparent'};color:${tab==='pastores'?'#2563eb':'#6b7280'};box-shadow:${tab==='pastores'?'0 1px 3px rgba(16,24,40,.10)':'none'};">Pastores (${campo.length})</button>
      <button data-personal-tab="oficina" style="padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:${tab==='oficina'?'white':'transparent'};color:${tab==='oficina'?'#2563eb':'#6b7280'};box-shadow:${tab==='oficina'?'0 1px 3px rgba(16,24,40,.10)':'none'};">Personal de Oficina (${oficina.length})</button>
    </div>`;

  const filtrosActivos = [];
  if (S.fEstado && S.fEstado !== 'all') filtrosActivos.push({label: `Estado: ${S.fEstado}`, clear: 'fEstado'});
  if (S.fRol    && S.fRol    !== 'all') filtrosActivos.push({label: `Rol: ${S.fRol}`,       clear: 'fRol'});
  const filtroBar = filtrosActivos.length ? `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#6b7280;">Filtros activos:</span>
      ${filtrosActivos.map(f=>`<span style="background:#eff4ff;color:#2563eb;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;">${f.label} <button data-clear-filter="${f.clear}" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:14px;line-height:1;padding:0;">×</button></span>`).join('')}
      <button id="btn-clear-all-filters" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;text-decoration:underline;">Limpiar todo</button>
    </div>` : '';

  const bulkBar = (tab === 'pastores' && selCount > 0) ? `
    <div style="position:sticky;top:0;z-index:10;background:#2563eb;color:white;border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:600;">${selCount} pastor${selCount!==1?'es':''} seleccionado${selCount!==1?'s':''}</span>
      <span style="flex:1;"></span>
      <span style="font-size:12px;opacity:.7;">Cambiar estado a:</span>
      <button id="btn-bulk-pastor-ordenado" style="background:#166534;color:white;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">Ordenado</button>
      <button id="btn-bulk-pastor-licenciado" style="background:#991b1b;color:white;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">Licenciado</button>
      <button id="btn-bulk-pastor-clear" style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;">✕ Cancelar</button>
    </div>` : '';

  const rolCfg = {
    pastor:        { label:'Pastor',        bg:'#dbeafe', color:'#1e40af' },
    asociado:      { label:'Asociado',      bg:'#dcfce7', color:'#166534' },
    plantador:     { label:'Plantador',     bg:'#d1fae5', color:'#065f46' },
    departamental: { label:'Departamental', bg:'#fef3c7', color:'#92400e' },
    administrador: { label:'Administrador', bg:'#ede9fe', color:'#5b21b6' },
    oficina:       { label:'Oficina',       bg:'#fce7f3', color:'#9d174d' },
  };

  function pastorCard(p) {
    const parts = p.nombre.split(/[\s,]+/).filter(Boolean);
    const initials = parts.slice(0,2).map(w=>w[0].toUpperCase()).join('');
    const checked = sel.has(p.cod);
    const rc = rolCfg[p.rol||'pastor'] || rolCfg.pastor;
    const esOficina = p.rol==='departamental'||p.rol==='administrador'||p.rol==='oficina';
    const ppNombre = p.rol==='asociado' && p.pastor_principal_cod ? RAW.pastores.find(x=>x.cod===p.pastor_principal_cod)?.nombre : null;
    const igNombre = p.rol==='plantador' && p.iglesia_asignada_cod ? RAW.iglesias.find(x=>x.cod===p.iglesia_asignada_cod)?.nombre : null;
    return `<div style="background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:${checked?'2px solid #2563eb':'1px solid #e8eaf2'};display:flex;align-items:flex-start;gap:14px;">
      <input type="checkbox" data-chk-pastor="${escHtml(p.cod)}" ${checked?'checked':''} style="width:16px;height:16px;margin-top:14px;cursor:pointer;accent-color:#2563eb;flex-shrink:0;" />
      <div style="width:44px;height:44px;border-radius:50%;background:${esOficina?'#ede9fe':'#dbeafe'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:${esOficina?'#5b21b6':'#1e40af'};flex-shrink:0;">${initials||'?'}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#1a2340;">${escHtml(p.nombre)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;">
          <span style="background:${rc.bg};color:${rc.color};border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600;">${rc.label}</span>
          <span style="background:${(p.estado||'ordenado')==='licenciado'?'#fecaca':'#e0e7ef'};color:${(p.estado||'ordenado')==='licenciado'?'#991b1b':'#374151'};border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600;text-transform:capitalize;">${(p.estado||'ordenado').replace('_',' ')}</span>
          ${!esOficina&&p.distrito?`<span style="font-size:11px;color:#9ca3af;">${escHtml(p.distrito)}</span>`:''}
          ${!esOficina?`<span style="background:#eff4ff;color:#2563eb;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600;">${igByPastor[p.nombre]||0} igl.</span>`:''}
          ${ppNombre?`<span style="font-size:11px;color:#6b7280;">→ ${escHtml(ppNombre)}</span>`:''}
          ${igNombre?`<span style="font-size:11px;color:#6b7280;">⛪ ${escHtml(igNombre)}</span>`:''}
        </div>
        ${p.telefono?`<div style="font-size:12px;color:#9ca3af;margin-top:3px;display:flex;align-items:center;gap:4px;">${icons.phone} ${escHtml(p.telefono)}</div>`:''}
        ${p.email?`<div style="font-size:12px;color:#9ca3af;margin-top:1px;display:flex;align-items:center;gap:4px;">${icons.mail} ${escHtml(p.email)}</div>`:''}
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        ${canDo('editar_pastores') ? `<button data-notas-pastor="${escHtml(p.cod)}" title="Agregar nota" style="background:transparent;border:1px solid #eef0f5;border-radius:6px;padding:5px 8px;cursor:pointer;color:#166534;display:flex;align-items:center;">${icons.note}</button>` : ''}
        <button data-edit-pastor="${escHtml(p.cod)}" style="background:transparent;border:1px solid #e8eaf2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6b7280;display:flex;align-items:center;">${icons.edit}</button>
        <button data-del-pastor="${escHtml(p.cod)}" style="background:transparent;border:1px solid #fee2e2;border-radius:6px;padding:5px 8px;cursor:pointer;color:#ef4444;display:flex;align-items:center;">${icons.trash}</button>
      </div>
    </div>`;
  }

  const selectAll = activeList.length ? `<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#6b7280;cursor:pointer;"><input id="chk-pastor-all" type="checkbox" ${allChecked?'checked':''} style="accent-color:#2563eb;width:15px;height:15px;" /> Seleccionar todos</label>` : '';

  const grid = activeList.length
    ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">${activeList.map(pastorCard).join('')}</div>`
    : `<div style="padding:40px;text-align:center;color:#9ca3af;font-size:14px;">${filtrosActivos.length ? 'Sin resultados para los filtros activos' : (tab==='oficina' ? 'No hay personal de oficina registrado' : 'No hay pastores registrados')}</div>`;

  return `<div style="display:flex;flex-direction:column;gap:20px;">${tabBar}${bulkBar}${filtroBar}<div style="display:flex;justify-content:flex-end;">${selectAll}</div>${grid}</div>`;
}

/* ---- SOLICITUDES ---- */
function buildSolicitudes() {
  const estadoInfo = {
    pendiente_francis:  { label:'Pendiente (Francis)',  bg:'#fef9c3', color:'#854d0e' },
    rechazado_francis:  { label:'Rechazado',            bg:'#fee2e2', color:'#991b1b' },
    pendiente_cesar:    { label:'Pendiente (César)',     bg:'#dbeafe', color:'#1e40af' },
    pendiente_carlos:   { label:'Pendiente (Carlos)',   bg:'#ede9fe', color:'#5b21b6' },
    pendiente_noemi:    { label:'Pendiente (Noemí)',    bg:'#fce7f3', color:'#9d174d' },
    completado:         { label:'Completado',           bg:'#dcfce7', color:'#166534' },
  };
  const items = S._solicitudes || [];
  const loading = S._solicitudesLoading;

  let contenido;
  if (loading) {
    contenido = `<div style="text-align:center;padding:60px;color:#6b7280;">Cargando solicitudes…</div>`;
  } else if (!items.length) {
    contenido = `<div style="text-align:center;padding:60px;">
      <div style="font-size:40px;margin-bottom:12px;">📋</div>
      <div style="color:#6b7280;font-size:15px;">No hay solicitudes aún.</div>
      <div style="margin-top:16px;"><a href="/nueva-congregacion" target="_blank" style="color:#2563eb;font-weight:600;font-size:14px;">Compartir enlace del formulario →</a></div>
    </div>`;
  } else {
    contenido = `<div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead><tr style="background:#f8f9fc;">
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Congregación</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Pastor</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Zona</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Código</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Estado</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Fecha</th>
          <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Acción</th>
        </tr></thead>
        <tbody>
          ${items.map(s => {
            const est = estadoInfo[s.estado] || { label: s.estado, bg:'#f3f4f6', color:'#374151' };
            const fecha = new Date(s.created_at).toLocaleDateString('es-DO', {day:'2-digit',month:'short',year:'numeric'});
            const enlaceMap = {
              pendiente_cesar:  s.token_cesar  ? `/paso-cesar.html?token=${s.token_cesar}`  : null,
              pendiente_carlos: s.token_carlos ? `/paso-carlos.html?token=${s.token_carlos}` : null,
              pendiente_noemi:  s.token_noemi  ? `/paso-noemi.html?token=${s.token_noemi}`  : null,
            };
            const enlace = enlaceMap[s.estado];
            const btnCopiar = enlace
              ? `<button onclick="navigator.clipboard.writeText(location.origin+'${enlace}').then(()=>{ this.textContent='✓ Copiado'; setTimeout(()=>this.textContent='🔗 Copiar enlace',2000) })" style="background:#eff4ff;color:#2563eb;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:500;">🔗 Copiar enlace</button>`
              : '';
            const btnEliminar = `<button data-del-sol="${escHtml(s.id)}" data-del-sol-nombre="${escHtml(s.nombre_congregacion)}" style="background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:500;margin-left:4px;">✕</button>`;
            return `<tr style="border-bottom:1px solid #f0f2f7;">
              <td style="padding:12px 16px;font-weight:600;color:#1e3564;">${escHtml(s.nombre_congregacion)}</td>
              <td style="padding:12px 16px;color:#374151;">${escHtml(s.nombre_pastor)}</td>
              <td style="padding:12px 16px;color:#6b7280;">${escHtml(s.zona||'—')}</td>
              <td style="padding:12px 16px;"><span style="font-family:monospace;background:#f0f2f7;padding:2px 8px;border-radius:4px;">${escHtml(s.codigo_asignado||'—')}</span></td>
              <td style="padding:12px 16px;"><span style="background:${est.bg};color:${est.color};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;">${est.label}</span></td>
              <td style="padding:12px 16px;color:#6b7280;font-size:13px;">${fecha}</td>
              <td style="padding:12px 16px;">${btnCopiar}${btnEliminar}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-size:18px;font-weight:700;color:#1a2340;margin-bottom:4px;">Solicitudes de Nueva Congregación</h2>
        <p style="font-size:13px;color:#6b7280;">Seguimiento del flujo de aprobación de nuevas congregaciones.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a href="/nueva-congregacion" target="_blank" style="display:flex;align-items:center;gap:6px;background:#2563eb;color:white;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;text-decoration:none;">🔗 Compartir enlace al pastor</a>
        <button id="btn-reload-solicitudes" style="display:flex;align-items:center;gap:6px;background:#f0f2f7;color:#374151;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;">↻ Actualizar</button>
      </div>
    </div>
    <div style="background:white;border-radius:14px;border:1px solid #e8eaf2;overflow:hidden;">
      ${contenido}
    </div>
    <div style="background:#eff4ff;border-radius:12px;padding:16px;font-size:13px;color:#2563eb;">
      <strong>Flujo:</strong> Pastor llena formulario → Francis aprueba → César confirma SunPlus y asigna código → Carlos crea cuenta en Ecclesia → Noemí confirma Infomac y ACMS → Congregación creada como <strong>Grupo</strong> en el sistema.
    </div>
  </div>`;
}

/* ---- PERMISOS DE AUSENCIA ---- */
function buildPermisos() {
  if (!canDo('ver_permisos')) return NO_ACCESO;
  const items = S._permisos || [];
  const loading = S._permisosLoading;
  const motivoLabel = { enfermedad:'Enfermedad', cita_medica:'Cita Médica', asuntos_familiares:'Asuntos Familiares', asuntos_oficiales:'Asuntos Oficiales', asuntos_personales:'Asuntos Personales' };
  const estadoInfo = { pendiente:{ label:'Pendiente', bg:'#fef9c3', color:'#854d0e' }, aprobado:{ label:'Aprobado', bg:'#dcfce7', color:'#166534' }, rechazado:{ label:'Rechazado', bg:'#fee2e2', color:'#991b1b' } };
  let contenido;
  if (loading) {
    contenido = `<div style="text-align:center;padding:60px;color:#6b7280;">Cargando permisos…</div>`;
  } else if (!items.length) {
    contenido = `<div style="text-align:center;padding:60px;"><div style="font-size:40px;margin-bottom:12px;">📋</div><div style="color:#6b7280;font-size:15px;">No hay permisos registrados.</div></div>`;
  } else {
    contenido = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead><tr style="background:#f8f9fc;">
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Nombre</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Motivo</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Lugar</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Fecha Ausencia</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Estado</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Acción</th>
      </tr></thead>
      <tbody>${items.map(p => {

          <div style="display:flex;align-items:center;gap:10px;">
            <span style="width:34px;height:34px;border-radius:10px;background:#dcfce7;color:#166534;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icons.note}</span>
            <div>
              <div style="font-weight:600;font-size:14px;color:#1a2340;">${escHtml(pastorNombre(n.pastor_cod))}</div>
              <div style="font-size:12px;color:#9ca3af;">${fecha}${n.autor?' · '+escHtml(n.autor):''}</div>

      ${pastoresConNota.map(p=>`<option value="${escHtml(p.cod)}" ${S.notaFiltroPastor===p.cod?'selected':''}>${escHtml(p.nombre)}</option>`).join('')}

/* ---- VACACIONES ---- */
function diasEntre(inicio, fin) {
  if (!inicio || !fin) return 0;
  const a = new Date(inicio+'T12:00:00'), b = new Date(fin+'T12:00:00');
  return Math.round((b-a)/86400000) + 1;
}
function getVacBalance(pastor_cod) {
  return (S._vacBalance||[]).find(b => b.pastor_cod === pastor_cod) || null;
}
function fmtDisponible(b) {
  if (!b || b.dias_asignados_anio == null) return '<span style="color:#9ca3af;">Falta fecha de ingreso</span>';
  const disp = b.dias_asignados_anio - b.dias_tomados_anio;
  return `${disp} de ${b.dias_asignados_anio} días (${b.dias_tomados_anio} tomados este año)`;
}
function buildVacaciones() {
  if (!canDo('ver_vacaciones')) return NO_ACCESO;
  const items = S._vacaciones || [];
  const loading = S._vacacionesLoading;
  const hoyVacStr = new Date().toISOString().slice(0,10);
  const estadoInfo = { pendiente:{ label:'Pendiente', bg:'#fef9c3', color:'#854d0e' }, aprobado:{ label:'Aprobado', bg:'#dcfce7', color:'#166534' }, rechazado:{ label:'Rechazado', bg:'#fee2e2', color:'#991b1b' } };
  let contenido;
  if (loading) {
    contenido = `<div style="text-align:center;padding:60px;color:#6b7280;">Cargando vacaciones…</div>`;
  } else if (!items.length) {
    contenido = `<div style="text-align:center;padding:60px;"><div style="font-size:40px;margin-bottom:12px;">☀️</div><div style="color:#6b7280;font-size:15px;">No hay solicitudes de vacaciones registradas.</div></div>`;
  } else {
    contenido = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead><tr style="background:#f8f9fc;">
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Nombre</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Período</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Días</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Disponibles (año)</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Estado</th>
        <th style="padding:12px 16px;text-align:left;color:#6b7280;font-weight:600;font-size:12px;">Acción</th>
      </tr></thead>
      <tbody>${items.map(v => {
        const est = estadoInfo[v.estado] || { label:v.estado, bg:'#f3f4f6', color:'#374151' };
        const fFmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}) : '—';
        const canGest = canDo('gestionar_vacaciones');
        const bal = getVacBalance(v.pastor_cod);
        const btnAprobar  = canGest && v.estado !== 'aprobado'  ? `<button data-aprobar-vacacion="${escHtml(v.id)}" style="background:#dcfce7;color:#166534;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600;margin-right:4px;">✓ Aprobar</button>` : '';
        const btnRechazar = canGest && v.estado !== 'rechazado' ? `<button data-rechazar-vacacion="${escHtml(v.id)}" style="background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600;margin-right:4px;">✕ Rechazar</button>` : '';
        const btnPrint = `<button data-print-vacacion="${escHtml(v.id)}" style="background:#eff4ff;color:#2563eb;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:500;margin-right:4px;">🖨️ Imprimir</button>`;
        const puedeReubicar = canGest && v.estado !== 'rechazado' && v.fecha_fin >= hoyVacStr;
        const btnReubicar = puedeReubicar ? `<button data-reubicar-vacacion="${escHtml(v.id)}" style="background:#fef3c7;color:#92400e;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600;margin-right:4px;">↻ Reubicar</button>` : '';
        const btnEdit = canGest ? `<button data-edit-vacacion="${escHtml(v.id)}" style="background:#f3f4f6;color:#374151;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:500;margin-right:4px;">✎</button>` : '';
        const btnDel  = canGest ? `<button data-del-vacacion="${escHtml(v.id)}" data-del-vacacion-nombre="${escHtml(v.nombre)}" style="background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:500;">✕</button>` : '';
        return `<tr style="border-bottom:1px solid #f0f2f7;">
          <td style="padding:12px 16px;font-weight:600;color:#1e3564;">${escHtml(v.nombre)}</td>
          <td style="padding:12px 16px;color:#6b7280;">${fFmt(v.fecha_inicio)} — ${fFmt(v.fecha_fin)}</td>
          <td style="padding:12px 16px;color:#374151;">${v.dias_solicitados}</td>

/* ---- CALENDARIO DE AUSENCIAS (Permisos + Vacaciones) ---- */
const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEMANA_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function calPillHtml(nombre, tipo, estado) {
  const colores = { permiso: { bg:'#eff4ff', color:'#2563eb' }, vacacion: { bg:'#fef3c7', color:'#92400e' } };
  const c = colores[tipo];
  let extra = '';
  if (estado === 'rechazado') extra = 'opacity:.45;text-decoration:line-through;';
  else if (estado === 'pendiente') extra = `opacity:.8;box-shadow:inset 0 0 0 1px ${c.color}66;`;
  const icono = tipo === 'permiso' ? '🗓️' : '☀️';
  const primerNombre = escHtml((nombre||'').split(',')[0]);
  return `<div title="${escHtml(nombre||'')}" style="background:${c.bg};color:${c.color};${extra}font-size:10px;line-height:1.4;padding:1px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${icono} ${primerNombre}</div>`;
}

function buildCalendarioAusencias() {
  if (!canDo('ver_permisos') && !canDo('ver_vacaciones')) return NO_ACCESO;
  const year = S.calYear, month = S.calMonth;
  const diasEnMes = new Date(year, month+1, 0).getDate();
  const offset = new Date(year, month, 1).getDay();
  const hoyStr = new Date().toISOString().slice(0,10);

  const permisos = canDo('ver_permisos') ? (S._permisos||[]) : [];
  const vacaciones = canDo('ver_vacaciones') ? (S._vacaciones||[]) : [];
  const cargando = (canDo('ver_permisos') && S._permisosLoading) || (canDo('ver_vacaciones') && S._vacacionesLoading);

  const celdas = [];
  for (let i=0;i<offset;i++) celdas.push(`<div style="background:#fafbff;border-radius:8px;min-height:90px;"></div>`);
  for (let d=1; d<=diasEnMes; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evP = permisos.filter(p => p.fecha_ausencia === dateStr);
    const evV = vacaciones.filter(v => v.fecha_inicio && v.fecha_fin && v.fecha_inicio <= dateStr && dateStr <= v.fecha_fin);
    const esHoy = dateStr === hoyStr;
    const pills = evP.map(p => calPillHtml(p.nombre,'permiso',p.estado)).join('') + evV.map(v => calPillHtml(v.nombre,'vacacion',v.estado)).join('');
    celdas.push(`<div style="background:white;border:1px solid ${esHoy?'#2563eb':'#e8eaf2'};border-radius:8px;min-height:90px;padding:6px;overflow-y:auto;">
      <div style="font-size:11px;font-weight:700;color:${esHoy?'#2563eb':'#9ca3af'};margin-bottom:4px;">${d}</div>
      ${pills}
    </div>`);
  }

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-size:18px;font-weight:700;color:#1a2340;margin-bottom:4px;">Calendario de Ausencias</h2>
        <p style="font-size:13px;color:#6b7280;">Permisos de Ausencia y Vacaciones combinados, vista mensual.</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-cal-prev" style="background:#f0f2f7;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;color:#374151;font-weight:600;">←</button>
        <div style="font-size:14px;font-weight:700;color:#1a2340;min-width:160px;text-align:center;">${MESES_ES[month]} ${year}</div>
        <button id="btn-cal-next" style="background:#f0f2f7;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;color:#374151;font-weight:600;">→</button>
        <button id="btn-cal-hoy" style="background:#eff4ff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;color:#2563eb;font-weight:600;font-size:13px;">Hoy</button>
      </div>
    </div>
    <div style="display:flex;gap:16px;font-size:12px;color:#374151;">
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:3px;background:#eff4ff;border:1px solid #2563eb;display:inline-block;"></span> 🗓️ Permiso de Ausencia</div>
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:3px;background:#fef3c7;border:1px solid #92400e;display:inline-block;"></span> ☀️ Vacaciones</div>
      <div style="color:#9ca3af;">(atenuado = pendiente · tachado = rechazado)</div>
    </div>
    ${cargando ? `<div style="text-align:center;padding:20px;color:#6b7280;">Cargando…</div>` : ''}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
      ${DIAS_SEMANA_ES.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#6b7280;padding:4px;">${d}</div>`).join('')}
      ${celdas.join('')}
    </div>
  </div>`;
}

function orgFases(o) {
  return [
    { n:1, label:'Pastor Asignado', done:!!o.fase1_completada },
    { n:2, label:'Fecha Coordinada', done:!!o.fase2_completada },
    { n:3, label:'Ceremonia Realizada', done:!!o.fase3_completada },
    { n:4, label:'ACMS Actualizado', done:!!o.fase4_completada },
    { n:5, label:'Plataformas Actualizadas', done:!!o.fase5_completada },
  ];
}
function orgFaseActual(o) {
  const f = orgFases(o).find(x => !x.done);
  return f ? f.n : 5;
}
function buildOrganizacionCard(o, canGest) {
  const fases = orgFases(o);
  const doneCount = fases.filter(f => f.done).length;
  const completado = doneCount === 5;
  const actual = fases.find(f => !f.done);
  const badge = completado
    ? `<span style="background:#dcfce7;color:#166534;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;">✓ Completado</span>`
    : `<span style="background:#fef9c3;color:#854d0e;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;">Fase ${actual.n}: ${actual.label}</span>`;
  const barSegs = fases.map(f => `<div style="flex:1;height:6px;border-radius:3px;background:${f.done?'#2563eb':'#e8eaf2'};"></div>`).join('');
  const quickBtn = (!completado && canGest) ? `<button data-org-avanzar="${escHtml(o.id)}" style="background:#2563eb;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:500;">Marcar Fase ${actual.n} completada →</button>` : '';
  const gestBtn = `<button data-org-edit="${escHtml(o.id)}" style="background:#f3f4f6;color:#374151;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:500;">${canGest?'Gestionar':'Ver'}</button>`;

  const fechaCer = o.fecha_ceremonia ? new Date(o.fecha_ceremonia+'T12:00:00').toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}) : '';
  return `<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(16,24,40,.06);border:1px solid #e8eaf2;display:flex;flex-direction:column;gap:10px;">

    </div>
  </div>`;

function buildOrganizacion() {
  if (!canDo('ver_organizacion')) return NO_ACCESO;
  const items = S._organizaciones || [];
  const loading = S._organizacionesLoading;
  const canGest = canDo('gestionar_organizacion');
  let list = items;
  const fFase = S.fOrgFase || 'all';
  if (fFase !== 'all') {
    list = fFase === 'completado' ? list.filter(o => orgFaseActual(o)===5 && orgFases(o).every(f=>f.done)) : list.filter(o => !orgFases(o).every(f=>f.done) && orgFaseActual(o)===Number(fFase));
  }
  let contenido;
  if (loading) {
    contenido = `<div style="text-align:center;padding:60px;color:#6b7280;">Cargando…</div>`;
  } else if (!list.length) {
    contenido = `<div style="text-align:center;padding:60px;"><div style="font-size:40px;margin-bottom:12px;">⛪</div><div style="color:#6b7280;font-size:15px;">No hay grupos en proceso de organización.</div></div>`;
  } else {
    contenido = `<div style="display:flex;flex-direction:column;gap:14px;">${list.map(o => buildOrganizacionCard(o, canGest)).join('')}</div>`;
  }

    { v:'all', label:'Todos' }, { v:'1', label:'Fase 1' }, { v:'2', label:'Fase 2' },
    { v:'3', label:'Fase 3' }, { v:'4', label:'Fase 4' }, { v:'5', label:'Fase 5' }, { v:'completado', label:'Completados' },

    </div>

  const canGest = canDo('gestionar_organizacion');
  const gruposDisponibles = RAW.iglesias
    .filter(i => i.tipo === 'grupo' && (i.cod === f.iglesia_cod || !(S._organizaciones||[]).some(o => o.iglesia_cod === i.cod)))
    .sort((a,b) => a.nombre.localeCompare(b.nombre,'es'));

  const fld = (label, id, value, type='text') => `<div><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">${label}</label>
    <input id="${id}" type="${type}" value="${escHtml(value||'')}" ${canGest?'':'disabled'} style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box;background:${canGest?'white':'#f8f9fc'};" /></div>`;
  const chk = (label, id, checked) => `<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#374151;cursor:pointer;">
    <input type="checkbox" id="${id}" ${checked?'checked':''} ${canGest?'':'disabled'} style="width:16px;height:16px;cursor:pointer;accent-color:#2563eb;flex-shrink:0;" /> ${label}</label>`;
  const section = (num, title, bodyHtml, doneKey) => `
    <div style="border:1px solid #e8eaf2;border-radius:12px;overflow:hidden;flex-shrink:0;">
      <div style="background:${f[doneKey]?'#f0fdf4':'#f8f9fc'};padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:22px;height:22px;border-radius:50%;background:${f[doneKey]?'#166534':'#2563eb'};color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${f[doneKey]?'✓':num}</span>
          <span style="font-weight:600;font-size:14px;color:#1a2340;">${title}</span>
        </div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;cursor:pointer;">
          <input type="checkbox" id="org-${doneKey}" ${f[doneKey]?'checked':''} ${canGest?'':'disabled'} style="width:15px;height:15px;cursor:pointer;accent-color:#166534;" /> Fase completada
        </label>
      </div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">${bodyHtml}</div>
    </div>`;

  const fase1Body = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      ${fld('Pastor asignado','org-pastor-asignado',f.pastor_asignado)}
      ${fld('Teléfono del pastor','org-pastor-telefono',f.pastor_telefono,'tel')}
    </div>
    ${chk('Pastor confirmó disponibilidad','org-pastor-confirmado',f.pastor_confirmado)}`;

  const fase2Body = `
    ${fld('Fecha de ceremonia coordinada','org-fecha-ceremonia',f.fecha_ceremonia,'date')}
    <div style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-top:4px;">Requisitos mínimos</div>
    ${chk('Mínimo 25 miembros','org-req-miembros',f.req_min_miembros)}
    ${chk('Líderes dispuestos a asumir compromisos','org-req-lideres',f.req_lideres)}
    ${chk('Solvencia financiera','org-req-solvencia',f.req_solvencia)}
    ${chk('Instructivo de organización enviado a la junta','org-instructivo-enviado',f.instructivo_enviado_junta)}`;

  const fase3Body = `
    ${fld('Fecha en que se realizó la ceremonia','org-fecha-ceremonia-realizada',f.fecha_ceremonia_realizada,'date')}
    ${chk('Solicitud de recepción oficial firmada','org-acta-firmada',f.acta_firmada)}
    <div style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-top:4px;">Checklist de materiales</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;">
      ${MATERIALES_ORG.map(m => chk(m.label, 'org-mat-'+m.id, !!(f.checklist_materiales||{})[m.id])).join('')}
    </div>
    <details style="margin-top:6px;">
      <summary style="cursor:pointer;font-size:12px;color:#2563eb;font-weight:600;">Ver programa sugerido de la ceremonia (~185 min)</summary>
      <div style="margin-top:8px;max-height:180px;overflow-y:auto;font-size:12px;color:#374151;">
        ${PROGRAMA_CEREMONIA_ORG.map(([a,m]) => `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0f2f7;"><span>${escHtml(a)}</span><span style="color:#9ca3af;">${m} min</span></div>`).join('')}
      </div>
    </details>`;

  const fase4Body = `
    ${fld('Fecha de actualización en ACMS','org-acms-fecha',f.acms_fecha,'date')}
    ${chk('Estado cambiado en ACMS a "Iglesia Organizada"','org-acms-actualizado',f.acms_actualizado)}
    <div><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">Primeros oficiales electos</label>
      <textarea id="org-oficiales-electos" placeholder="Ancianos, diáconos, diaconisas…" ${canGest?'':'disabled'} style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;resize:vertical;min-height:60px;box-sizing:border-box;">${escHtml(f.oficiales_electos||'')}</textarea></div>
    <div style="font-size:12px;color:#9ca3af;">Al marcar esta fase como completada, el sistema cambiará automáticamente el tipo de esta iglesia de "Grupo" a "Iglesia" en el padrón.</div>`;

  const fase5Body = `
    <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">Marcar cada plataforma una vez actualizada.</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${PLATAFORMAS_ORG.map(p => `<label style="display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;color:#374151;padding:6px 10px;background:#f8f9fc;border-radius:8px;">
        <span style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="org-plat-${p.id}" ${!!(f.plataformas||{})[p.id]?'checked':''} ${canGest?'':'disabled'} style="width:16px;height:16px;cursor:pointer;accent-color:#2563eb;" /> ${escHtml(p.label)}</span>
        <span style="color:#9ca3af;font-size:11px;">${escHtml(p.resp)}</span>
      </label>`).join('')}
    </div>`;

  const iglesiaSelector = editing
    ? `<div style="padding:12px 16px;background:#f8f9fc;border-radius:10px;font-size:14px;flex-shrink:0;"><strong>${escHtml(f.iglesia_nombre)}</strong><div style="font-size:12px;color:#9ca3af;margin-top:2px;">${escHtml(f.distrito||'—')} · ${escHtml(f.zona||'—')}</div></div>`
    : `<div style="flex-shrink:0;"><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">Grupo a organizar <span style="color:#ef4444;">*</span></label>
        <select id="org-iglesia-select" style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;background:white;">
          <option value="">Seleccione un grupo…</option>
          ${gruposDisponibles.map(i => `<option value="${escHtml(i.cod)}" ${f.iglesia_cod===i.cod?'selected':''}>${escHtml(i.nombre)} — ${escHtml(i.distrito||'')}</option>`).join('')}
        </select></div>`;

  return `<div id="organizacion-modal-bg" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:white;border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0;flex-shrink:0;">
        <h3 style="font-size:17px;font-weight:700;color:#1a2340;">${editing?'Gestionar Organización de Iglesia':'Nuevo Grupo en Proceso de Organización'}</h3>
        <button id="btn-organizacion-close" style="background:transparent;border:none;cursor:pointer;color:#9ca3af;font-size:20px;line-height:1;">×</button>
      </div>
      <div id="organizacion-modal-scroll" style="padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;flex:1;">
        ${iglesiaSelector}
        ${section(1,'Asignar Pastor Oficial', fase1Body, 'fase1_completada')}
        ${section(2,'Asignar Fecha de Organización', fase2Body, 'fase2_completada')}
        ${section(3,'Realizar Ceremonia de Organización', fase3Body, 'fase3_completada')}
        ${section(4,'Actualizar ACMS', fase4Body, 'fase4_completada')}
        ${section(5,'Actualizar Demás Plataformas', fase5Body, 'fase5_completada')}
        <div style="flex-shrink:0;"><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">Notas generales</label>
          <textarea id="org-notas" placeholder="Notas adicionales…" ${canGest?'':'disabled'} style="width:100%;padding:10px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;outline:none;resize:vertical;min-height:60px;box-sizing:border-box;">${escHtml(f.notas||'')}</textarea></div>
      </div>
      <div style="padding:16px 24px 24px;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;border-top:1px solid #f0f2f7;">
        <button id="btn-organizacion-cancel" style="padding:10px 20px;border-radius:8px;border:1.5px solid #e8eaf2;background:white;color:#6b7280;font-size:14px;cursor:pointer;font-weight:500;">${canGest?'Cancelar':'Cerrar'}</button>
        ${canGest?`<button id="btn-organizacion-save" style="padding:10px 20px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:14px;cursor:pointer;font-weight:500;">${editing?'Guardar cambios':'Crear'}</button>`:''}
      </div>
    </div>
  </div>`;
}
