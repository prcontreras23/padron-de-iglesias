<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nueva Congregación — Asoc. Dom. Sureste</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(30,53,100,.10);max-width:560px;width:100%;overflow:hidden}
.header{background:#1e3564;padding:28px 32px}.header h1{color:white;font-size:22px;margin-bottom:4px}.header p{color:#93c5fd;font-size:13px}
.body{padding:32px}
.group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}.req{color:#ef4444}
input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;font-family:inherit;color:#1a2340;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#1e3564}
textarea{resize:vertical;min-height:80px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{width:100%;padding:14px;background:#1e3564;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#2d5090}.btn:disabled{background:#9ca3af;cursor:not-allowed}
.msg{display:none;padding:14px;border-radius:8px;margin-top:16px;font-size:14px}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Solicitud de Nueva Congregación</h1>
    <p>Asociación Dominicana del Sureste · Sistema de Gestión</p>
  </div>
  <div class="body">
    <form id="form">
      <div class="group"><label>Nombre de la congregación <span class="req">*</span></label><input type="text" name="nombre_congregacion" placeholder="Ej: Grupo Bíblico Talmarco" required></div>
      <div class="row">
        <div class="group"><label>Nombre del pastor <span class="req">*</span></label><input type="text" name="nombre_pastor" placeholder="Nombre completo" required></div>
        <div class="group"><label>Teléfono del pastor</label><input type="tel" name="telefono_pastor" placeholder="809-000-0000"></div>
      </div>
      <div class="group"><label>Email del pastor</label><input type="email" name="email_pastor" placeholder="pastor@correo.com"></div>
      <div class="row">
        <div class="group"><label>Zona <span class="req">*</span></label><select name="zona" required id="sel-zona"><option value="">Seleccionar…</option></select></div>
        <div class="group"><label>Distrito <span class="req">*</span></label><select name="distrito" required id="sel-distrito"><option value="">Seleccionar…</option></select></div>
      </div>
      <div class="group"><label>Dirección / Sector</label><input type="text" name="direccion" placeholder="Barrio, municipio o dirección"></div>
      <div class="group"><label>¿Por qué se está organizando esta congregación?</label><textarea name="descripcion" placeholder="Descripción breve…"></textarea></div>
      <button type="submit" class="btn" id="btn">Enviar solicitud</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>
<script>
const SB_URL='https://gvbknabnrlliofbchczv.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2YmtuYWJucmxsaW9mYmNoY3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjg3MTcsImV4cCI6MjA5NjkwNDcxN30.v7IXmkGpidbpCPZsDh_wFh_pLsP13QhTueYtiLfkH9Q';
async function sbGet(p){return(await fetch(`${SB_URL}/rest/v1/${p}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})).json();}
let zonas=[],distritos=[];
async function init(){
  [zonas,distritos]=await Promise.all([sbGet('zonas?select=cod,nombre&order=nombre'),sbGet('distritos?select=cod,nombre,codZona&order=nombre')]);
  const s=document.getElementById('sel-zona');
  zonas.forEach(z=>s.innerHTML+=`<option value="${z.cod}">${z.nombre}</option>`);
}
document.getElementById('sel-zona').addEventListener('change',function(){
  const s=document.getElementById('sel-distrito');
  s.innerHTML='<option value="">Seleccionar…</option>';
  distritos.filter(d=>d.codZona===this.value).forEach(d=>s.innerHTML+=`<option value="${d.cod}">${d.nombre}</option>`);
});
document.getElementById('form').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=document.getElementById('btn'),msg=document.getElementById('msg');
  btn.disabled=true;btn.textContent='Enviando…';msg.style.display='none';
  const fd=new FormData(this),body=Object.fromEntries(fd.entries());
  const zona=zonas.find(z=>z.cod===body.zona),distrito=distritos.find(d=>d.cod===body.distrito);
  body.cod_zona=body.zona;body.zona=zona?.nombre||body.zona;
  body.cod_distrito=body.distrito;body.distrito=distrito?.nombre||body.distrito;
  try{
    const r=await fetch('/api/nueva-congregacion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await r.json();
    if(r.ok){msg.className='msg ok';msg.textContent='✅ Solicitud enviada. Recibirás una notificación cuando sea procesada.';this.reset();document.getElementById('sel-distrito').innerHTML='<option value="">Seleccionar…</option>';}
    else{msg.className='msg err';msg.textContent='❌ Error: '+(data.error||'Error desconocido');}
  }catch{msg.className='msg err';msg.textContent='❌ Error de conexión. Intenta de nuevo.';}
  msg.style.display='block';btn.disabled=false;btn.textContent='Enviar solicitud';
});
init();
</script>
</body>
</html>
