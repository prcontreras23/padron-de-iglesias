<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="/logo.png">
<title>Portal del Empleado — Asoc. Dom. Sureste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;color:#1a2340}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(30,53,100,.10);max-width:560px;width:100%;overflow:hidden}
.header{background:#1e3564;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{color:white;font-size:20px}.header p{color:#93c5fd;font-size:12px;margin-top:2px}
.header .logout{background:rgba(255,255,255,.14);color:white;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer}
.body{padding:28px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid #e8eaf2;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:white;color:#1a2340}
input:focus,select:focus,textarea:focus{border-color:#1e3564}
input[readonly]{background:#f8f9fc;color:#6b7280}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.required{color:#ef4444;margin-left:2px}
.hint{font-size:12px;color:#9ca3af;margin-top:4px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:#1e3564;color:white;margin-top:4px}
.btn:hover{background:#162a4d}.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{background:transparent;color:#1e3564;border:1.5px solid #e8eaf2;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;width:auto}
.msg{padding:14px;border-radius:8px;font-size:14px;display:none;margin-top:8px}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.stack{display:flex;flex-direction:column;gap:16px}
.pin-input{letter-spacing:8px;font-size:22px;text-align:center;font-family:monospace}
.menu-opt{display:flex;align-items:center;gap:16px;padding:18px 20px;border:1.5px solid #e8eaf2;border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;text-align:left;background:white;width:100%}
.menu-opt:hover{border-color:#1e3564;background:#f8f9ff}
.menu-opt .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-opt>span:last-child{display:block}
.menu-opt .t{display:block;font-size:16px;font-weight:700;color:#1a2340}
.menu-opt .d{display:block;font-size:13px;color:#6b7280;margin-top:3px;font-weight:400}
.info-box{font-size:13px;color:#374151;background:#f8f9fc;border-radius:8px;padding:10px 14px}
.info-box strong{color:#1a2340}.info-box.warn{background:#fef9c3;color:#854d0e}
.radio-row{display:flex;gap:20px;padding:4px 0}
.radio-opt{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;cursor:pointer}
.radio-opt input{width:auto;accent-color:#1e3564}
.firma-wrap{border:1.5px solid #e8eaf2;border-radius:8px;padding:8px;background:#fafbff}
.firma-wrap canvas{width:100%;height:150px;display:block;border-radius:6px;background:white;touch-action:none;cursor:crosshair}
.firma-footer{display:flex;justify-content:flex-end;margin-top:8px}
.back{background:none;border:none;color:#1e3564;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-bottom:4px;display:inline-flex;align-items:center;gap:4px}
.hist-row{display:grid;grid-template-columns:1.4fr 1fr auto;gap:10px;padding:10px 12px;border:1px solid #e8eaf2;border-radius:8px;margin-bottom:8px;background:#fafbff;font-size:13px;align-items:center}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-weight:600;font-size:11px}
.badge.pendiente{background:#fef9c3;color:#a16207}.badge.aprobado{background:#dcfce7;color:#166534}.badge.rechazado{background:#fee2e2;color:#991b1b}
.badge.completado{background:#dcfce7;color:#166534}
h2.sec{font-size:17px;font-weight:700;margin-bottom:4px}
p.sub{font-size:13px;color:#6b7280;margin-bottom:8px}
.spin{display:inline-block;width:18px;height:18px;border:3px solid #dbe4ff;border-top-color:#1e3564;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:30px;color:#9ca3af}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div style="display:flex;align-items:center;gap:14px;min-width:0;">
      <img src="/logo.png" alt="Iglesia Adventista del Séptimo Día" style="width:46px;height:46px;flex-shrink:0;background:white;border-radius:50%;padding:3px;" />
      <div style="min-width:0;"><h1 id="hdr-title">Portal del Empleado</h1><p id="hdr-sub">Asociación Dominicana del Sureste</p></div>
    </div>
    <button class="logout" id="btn-logout" style="display:none;" onclick="logout()">Salir</button>
  </div>
  <div class="body" id="view"></div>
</div>

<script>
const API = '/api/portal-data';
let SESSION = null; // { token, perfil }
let balance = null;

// ── util ──────────────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fFmt(d){return d?new Date(d+'T12:00:00').toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function msg(t,tipo){const m=el('msg');if(!m)return;m.textContent=t;m.className='msg '+tipo;m.style.display='block';}
function clearMsg(){const m=el('msg');if(m)m.style.display='none';}
async function apiData(accion,extra){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:SESSION.token,accion,...extra})});
  const data=await r.json();
  if(r.status===401){logout();throw new Error(data.error||'Sesión expirada');}
  if(!r.ok)throw new Error(data.error||'Error');
  return data;
}
function setHeader(title,sub){el('hdr-title').textContent=title;el('hdr-sub').textContent=sub;}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  el('btn-logout').style.display='none';
  setHeader('Portal del Empleado','Asociación Dominicana del Sureste');
  el('view').innerHTML=`
    <div class="stack">
      <div>
        <h2 class="sec">Iniciar sesión</h2>
        <p class="sub">Ingresa con tu código de empleado y tu PIN de 6 dígitos. Si no lo tienes, solicítalo a la Secretaría.</p>
      </div>
      <div><label>Código de empleado <span class="required">*</span></label>
        <input id="cod" type="text" placeholder="Ej: P022" autocomplete="off" style="text-transform:uppercase;letter-spacing:2px;font-family:monospace;" /></div>
      <div><label>PIN (6 dígitos) <span class="required">*</span></label>
        <input id="pin" class="pin-input" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="off" /></div>
      <div class="msg" id="msg"></div>
      <button class="btn" id="btn-login" onclick="login()">Entrar</button>
    </div>`;
  el('pin').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,6);});
  el('cod').addEventListener('keydown',e=>{if(e.key==='Enter')el('pin').focus();});
  el('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  setTimeout(()=>el('cod').focus(),50);
}
async function login(){
  const cod=el('cod').value.trim().toUpperCase();
  const pin=el('pin').value.trim();
  if(!cod){msg('Ingresa tu código de empleado.','err');return;}
  if(!/^\d{6}$/.test(pin)){msg('El PIN debe ser de 6 dígitos.','err');return;}
  const btn=el('btn-login');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';clearMsg();
  try{
    const r=await fetch('/api/portal-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cod,pin})});
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||'Error al iniciar sesión');
    SESSION={token:data.token,perfil:data.perfil};
    sessionStorage.setItem('portal_session',JSON.stringify(SESSION));
    renderMenu();
  }catch(e){msg(e.message,'err');btn.disabled=false;btn.textContent='Entrar';}
}
function logout(){SESSION=null;balance=null;sessionStorage.removeItem('portal_session');renderLogin();}

// ── MENÚ ──────────────────────────────────────────────────────────────────────
const IC={
  sol:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>',
  perm:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>',
  igl:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3"/><path d="M10.5 3.5h3"/><path d="M4 21V10l8-5 8 5v11"/><path d="M9 21v-6a3 3 0 016 0v6"/></svg>',
};
function renderMenu(){
  el('btn-logout').style.display='block';
  setHeader('Hola, '+primerNombre(SESSION.perfil.nombre),'¿Qué deseas hacer hoy?');
  el('view').innerHTML=`
    <div class="stack">
      <button class="menu-opt" onclick="renderVacaciones()"><span class="ic" style="background:#fef3c7">${IC.sol}</span><span><span class="t">Solicitar Vacaciones</span><span class="d">Pide tus vacaciones y consulta el historial.</span></span></button>
      <button class="menu-opt" onclick="renderPermisos()"><span class="ic" style="background:#eff4ff">${IC.perm}</span><span><span class="t">Permiso de Ausencia</span><span class="d">Solicita un permiso de salida por un día.</span></span></button>
      <button class="menu-opt" onclick="renderOrganizacion()"><span class="ic" style="background:#dcfce7">${IC.igl}</span><span><span class="t">Organización de Iglesia</span><span class="d">Consulta el avance de la iglesia que estás organizando.</span></span></button>
    </div>`;
}
function primerNombre(nombre){
  // "Apellido, Nombre" -> Nombre ; "Nombre Apellido" -> Nombre
  if(!nombre)return '';
  if(nombre.includes(','))return nombre.split(',')[1].trim().split(/\s+/)[0];
  return nombre.split(/\s+/)[0];
}
function backBtn(){return `<button class="back" onclick="renderMenu()">‹ Volver al menú</button>`;}

// ── VACACIONES ────────────────────────────────────────────────────────────────
let firmaCtx=null,firmaCanvas=null,tieneFirma=false;
async function renderVacaciones(){
  setHeader('Solicitar Vacaciones',primerNombre(SESSION.perfil.nombre));
  el('view').innerHTML=`${backBtn()}<div class="loading"><span class="spin"></span></div>`;
  let data;
  try{ data=await apiData('perfil',{}); balance=data.balance; }catch(e){ el('view').innerHTML=backBtn()+`<div class="msg err" style="display:block">${esc(e.message)}</div>`; return; }
  const autoridad = SESSION.perfil.rol==='oficina' ? 'el Secretario Ejecutivo, Francis Contreras' : 'el pastor Gabriel Paulino, presidente';
  let balHtml='';
  if(balance && balance.dias_asignados_anio!=null){
    const semanas=Math.round(balance.dias_asignados_anio/7), disp=balance.dias_asignados_anio-balance.dias_tomados_anio;
    balHtml=`<div class="info-box">Según tus años de servicio te corresponden <strong>${semanas} semanas</strong> este año. Disponibles: <strong>${disp}</strong> de ${balance.dias_asignados_anio} días.</div>`;
  } else {
    balHtml=`<div class="info-box warn">No se pudo calcular tus semanas por antigüedad (falta tu fecha de ingreso). Contacta a la secretaría.</div>`;
  }
  el('view').innerHTML=`${backBtn()}
    <div class="stack">
      <h2 class="sec">Solicitar Vacaciones</h2>
      <div id="hist"></div>
      ${balHtml}
      <div><label>Correo electrónico <span class="required">*</span></label><input id="v-email" type="email" value="${esc(SESSION.perfil.email||'')}" placeholder="correo@ejemplo.com" /></div>
      <div><label>Celular <span class="required">*</span></label><input id="v-celular" type="tel" value="${esc(SESSION.perfil.telefono||'')}" placeholder="(000) 000-0000" /></div>
      <div><label>¿Cuántas semanas vas a tomar? <span class="required">*</span></label>
        <select id="v-semanas"><option value="">Seleccione…</option><option value="1">1 semana</option><option value="2">2 semanas</option><option value="3">3 semanas</option><option value="4">4 semanas</option></select></div>
      <div><label>¿Días feriados en el período? (opcional)</label><input id="v-feriados" type="number" min="0" step="1" placeholder="Ej: 1" /><p class="hint">Los feriados dentro del período no se descuentan.</p></div>
      <div class="row">
        <div><label>Fecha de salida <span class="required">*</span></label><input id="v-inicio" type="date" /></div>
        <div><label>Fecha de entrada <span class="required">*</span></label><input id="v-fin" type="date" readonly /><p class="hint">Se calcula automáticamente.</p></div>
      </div>
      <div class="info-box" id="v-dias" style="display:none"></div>
      <div><label>Observaciones</label><textarea id="v-obs" placeholder="Información adicional…"></textarea></div>
      <div><label>Confirmo que consulté con ${autoridad} y me autorizó estas vacaciones <span class="required">*</span></label>
        <div class="radio-row"><label class="radio-opt"><input type="radio" name="v-conf" value="si"> Sí</label><label class="radio-opt"><input type="radio" name="v-conf" value="no"> No</label></div></div>
      <div><label>Firma <span class="required">*</span></label>
        <div class="firma-wrap"><canvas id="firma" width="480" height="150"></canvas><div class="firma-footer"><button type="button" class="btn-sec" onclick="limpiarFirma()">Limpiar</button></div></div></div>
      <div class="msg" id="msg"></div>
      <button class="btn" id="btn-v" onclick="enviarVacaciones()">Enviar solicitud</button>
    </div>`;
  el('v-inicio').value=new Date().toISOString().slice(0,10);
  el('v-semanas').addEventListener('change',calcVac); el('v-feriados').addEventListener('input',calcVac); el('v-inicio').addEventListener('change',calcVac);
  initFirma();
  cargarHistVac();
}
function calcVac(){
  const s=parseInt(el('v-semanas').value)||0, f=Math.max(0,parseInt(el('v-feriados').value)||0), ini=el('v-inicio').value;
  if(s&&ini){const d=new Date(ini+'T12:00:00');d.setDate(d.getDate()+s*7);el('v-fin').value=d.toISOString().slice(0,10);}else{el('v-fin').value='';}
  const di=el('v-dias');
  if(!s){di.style.display='none';return;}
  const dias=Math.max(0,s*7-f);di.style.display='block';di.innerHTML=`Días a descontar: <strong>${dias}</strong> (${s} semana(s)${f?' menos '+f+' feriado(s)':''}).`;
}
async function cargarHistVac(){
  try{const {items}=await apiData('vacaciones_historial',{});
    if(!items.length)return;
    el('hist').innerHTML=`<div style="font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Mis solicitudes anteriores</div>`+
      items.map(s=>`<div class="hist-row"><div>${fFmt(s.fecha_inicio)} — ${fFmt(s.fecha_fin)}</div><div style="color:#6b7280">${s.dias_solicitados} días</div><div><span class="badge ${s.estado}">${cap(s.estado)}</span></div></div>`).join('');
  }catch(e){}
}
async function enviarVacaciones(){
  clearMsg();
  const email=el('v-email').value.trim(),celular=el('v-celular').value.trim(),semanas=el('v-semanas').value,feriados=el('v-feriados').value;
  const fecha_inicio=el('v-inicio').value,fecha_fin=el('v-fin').value,observaciones=el('v-obs').value.trim();
  const conf=document.querySelector('input[name=v-conf]:checked')?.value;
  if(!email)return msg('El correo es requerido.','err');
  if(!celular)return msg('El celular es requerido.','err');
  if(!semanas)return msg('Selecciona cuántas semanas tomarás.','err');
  if(!fecha_inicio||!fecha_fin)return msg('Completa las fechas.','err');
  if(conf!=='si')return msg('Debes confirmar que obtuviste la autorización antes de enviar.','err');
  if(!tieneFirma)return msg('Debes firmar la solicitud.','err');
  const btn=el('btn-v');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    await apiData('vacaciones_crear',{email,celular,semanas,feriados,fecha_inicio,fecha_fin,observaciones,confirmo:true,firma_data_url:firmaCanvas.toDataURL('image/png')});
    exito('¡Solicitud de vacaciones enviada!','Será revisada por Secretaría Ejecutiva. Te notificaremos la decisión.');
  }catch(e){msg(e.message,'err');btn.disabled=false;btn.textContent='Enviar solicitud';}
}

// ── PERMISOS ──────────────────────────────────────────────────────────────────
async function renderPermisos(){
  setHeader('Permiso de Ausencia',primerNombre(SESSION.perfil.nombre));
  el('view').innerHTML=`${backBtn()}
    <div class="stack">
      <h2 class="sec">Permiso de Ausencia</h2>
      <div id="hist"></div>
      <div><label>Correo electrónico <span class="required">*</span></label><input id="p-email" type="email" value="${esc(SESSION.perfil.email||'')}" placeholder="correo@ejemplo.com" /></div>
      <div><label>Fecha de ausencia <span class="required">*</span></label><input id="p-fecha" type="date" /></div>
      <div><label>Motivo <span class="required">*</span></label>
        <select id="p-motivo"><option value="enfermedad">Enfermedad</option><option value="cita_medica">Cita Médica</option><option value="asuntos_familiares">Asuntos Familiares</option><option value="asuntos_oficiales">Asuntos Oficiales</option><option value="asuntos_personales">Asuntos Personales</option></select></div>
      <div><label>Lugar donde irá</label><input id="p-lugar" type="text" placeholder="Lugar de destino" /></div>
      <div><label>Observaciones</label><textarea id="p-obs" placeholder="Información adicional…"></textarea></div>
      <div class="msg" id="msg"></div>
      <button class="btn" id="btn-p" onclick="enviarPermiso()">Enviar solicitud</button>
    </div>`;
  cargarHistPerm();
}
async function cargarHistPerm(){
  try{const {items}=await apiData('permisos_historial',{});
    if(!items.length)return;
    const ml={enfermedad:'Enfermedad',cita_medica:'Cita Médica',asuntos_familiares:'Asuntos Familiares',asuntos_oficiales:'Asuntos Oficiales',asuntos_personales:'Asuntos Personales'};
    el('hist').innerHTML=`<div style="font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Mis solicitudes anteriores</div>`+
      items.map(s=>`<div class="hist-row"><div>${fFmt(s.fecha_ausencia)}</div><div style="color:#6b7280">${ml[s.motivo]||s.motivo}</div><div><span class="badge ${s.estado}">${cap(s.estado)}</span></div></div>`).join('');
  }catch(e){}
}
async function enviarPermiso(){
  clearMsg();
  const email=el('p-email').value.trim(),fecha_ausencia=el('p-fecha').value,motivo=el('p-motivo').value,lugar=el('p-lugar').value.trim(),observaciones=el('p-obs').value.trim();
  if(!email)return msg('El correo es requerido.','err');
  if(!fecha_ausencia)return msg('La fecha de ausencia es requerida.','err');
  const btn=el('btn-p');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    await apiData('permisos_crear',{email,fecha_ausencia,motivo,lugar,observaciones});
    exito('¡Solicitud de permiso enviada!','Recibirás la confirmación de aprobación o rechazo por correo.');
  }catch(e){msg(e.message,'err');btn.disabled=false;btn.textContent='Enviar solicitud';}
}

// ── ORGANIZACIÓN ──────────────────────────────────────────────────────────────
const FASES=['Pastor Asignado','Fecha Coordinada','Ceremonia Realizada','ACMS Actualizado','Plataformas Actualizadas'];
async function renderOrganizacion(){
  setHeader('Organización de Iglesia',primerNombre(SESSION.perfil.nombre));
  el('view').innerHTML=`${backBtn()}<div class="loading"><span class="spin"></span></div>`;
  let items;
  try{ const d=await apiData('organizacion_estado',{}); items=d.items; }catch(e){ el('view').innerHTML=backBtn()+`<div class="msg err" style="display:block">${esc(e.message)}</div>`; return; }
  let cuerpo;
  if(!items.length){
    cuerpo=`<div class="info-box">No tienes ninguna iglesia en proceso de organización asignada a tu nombre. Si estás organizando una nueva iglesia, coordínalo con la Secretaría Ejecutiva para que quede registrada.</div>`;
  } else {
    cuerpo=items.map(o=>{
      const done=[o.fase1_completada,o.fase2_completada,o.fase3_completada,o.fase4_completada,o.fase5_completada];
      const nDone=done.filter(Boolean).length, actual=done.findIndex(x=>!x);
      const segs=done.map(d=>`<div style="flex:1;height:8px;border-radius:4px;background:${d?'#166534':'#e8eaf2'}"></div>`).join('');
      const estadoTxt=nDone===5?'<span class="badge completado">Completado</span>':`<span class="badge pendiente">Fase ${actual+1}: ${FASES[actual]}</span>`;
      return `<div style="border:1px solid #e8eaf2;border-radius:12px;padding:16px 18px;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
          <div style="font-weight:700;color:#1e3564;font-size:15px;">${esc(o.iglesia_nombre)}</div>${estadoTxt}</div>
        <div style="display:flex;gap:4px;margin-bottom:8px;">${segs}</div>
        <div style="font-size:12px;color:#6b7280;">${nDone}/5 fases completadas${o.fecha_ceremonia?' · Ceremonia: '+fFmt(o.fecha_ceremonia):''}</div>
      </div>`;
    }).join('');
  }
  el('view').innerHTML=`${backBtn()}<div class="stack"><h2 class="sec">Organización de Iglesia</h2><p class="sub">Avance de las iglesias que estás organizando.</p>${cuerpo}</div>`;
}

// ── éxito / firma / helpers ───────────────────────────────────────────────────
function exito(titulo,sub){
  el('view').innerHTML=`<div style="text-align:center;padding:30px 10px;">
    <div style="width:64px;height:64px;margin:0 auto 18px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h2 style="font-size:20px;font-weight:700;margin-bottom:10px;">${esc(titulo)}</h2>
    <div class="info-box" style="text-align:left;margin-bottom:16px;">${esc(sub)}</div>
    <button class="btn" onclick="renderMenu()">Volver al menú</button></div>`;
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function initFirma(){
  firmaCanvas=el('firma');firmaCtx=firmaCanvas.getContext('2d');
  firmaCtx.lineWidth=2;firmaCtx.lineCap='round';firmaCtx.strokeStyle='#1a2340';tieneFirma=false;
  let dib=false;
  const pos=e=>{const r=firmaCanvas.getBoundingClientRect(),sx=firmaCanvas.width/r.width,sy=firmaCanvas.height/r.height;const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left,cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;return{x:cx*sx,y:cy*sy};};
  const st=e=>{dib=true;tieneFirma=true;const p=pos(e);firmaCtx.beginPath();firmaCtx.moveTo(p.x,p.y);e.preventDefault();};
  const mv=e=>{if(!dib)return;const p=pos(e);firmaCtx.lineTo(p.x,p.y);firmaCtx.stroke();e.preventDefault();};
  const en=()=>{dib=false;};
  firmaCanvas.addEventListener('mousedown',st);firmaCanvas.addEventListener('mousemove',mv);window.addEventListener('mouseup',en);
  firmaCanvas.addEventListener('touchstart',st,{passive:false});firmaCanvas.addEventListener('touchmove',mv,{passive:false});firmaCanvas.addEventListener('touchend',en);
}
function limpiarFirma(){if(firmaCtx){firmaCtx.clearRect(0,0,firmaCanvas.width,firmaCanvas.height);tieneFirma=false;}}

// ── init ──────────────────────────────────────────────────────────────────────
(function(){
  const saved=sessionStorage.getItem('portal_session');
  if(saved){ try{ SESSION=JSON.parse(saved); renderMenu(); return; }catch(e){} }
  renderLogin();
})();
</script>
